name: Apply test numerology lineup alignment

on:
  push:
    branches:
      - test/mlb-model-drivers-footer
    paths:
      - .github/workflows/apply-test-numerology-lineup-alignment.yml

permissions:
  contents: write

concurrency:
  group: test-numerology-lineup-alignment
  cancel-in-progress: false

jobs:
  apply-generate-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: America/New_York

    steps:
      - name: Check out test branch
        uses: actions/checkout@v4
        with:
          ref: test/mlb-model-drivers-footer
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply lineup-alignment update
        run: python scripts/apply-numerology-lineup-alignment.py

      - name: Resolve current Eastern date
        id: date
        shell: bash
        run: echo "date=$(TZ=America/New_York date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Regenerate HR props with projected batting order
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: node scripts/generate-mlb-hr-props.mjs --force

      - name: Refresh player identity cache
        run: node scripts/update-player-identity-cache.mjs

      - name: Replace current-day numerology archive
        shell: bash
        run: rm -f "public/data/mlb/numerology/history/${{ steps.date.outputs.date }}.json"

      - name: Regenerate numerology with lineup alignment
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: node scripts/generate-mlb-numerology.mjs --date "${{ steps.date.outputs.date }}"

      - name: Validate batting-order coverage and traces
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const raw = JSON.parse(fs.readFileSync('public/data/mlb/hr-props-raw.json', 'utf8'));
          const numerology = JSON.parse(fs.readFileSync('public/data/mlb/numerology-daily.json', 'utf8'));
          const expectedDate = process.env.EXPECTED_DATE;

          if (raw.date !== expectedDate) throw new Error(`HR data date mismatch: ${raw.date}`);
          if (numerology.date !== expectedDate) throw new Error(`Numerology date mismatch: ${numerology.date}`);

          const battingRows = (raw.batters ?? []).filter((row) => Number.isInteger(row.battingOrder) && row.battingOrder >= 1 && row.battingOrder <= 9);
          if (!battingRows.length) throw new Error('No valid batting-order positions were published to HR data.');

          const surfaced = [...(numerology.featuredPlays ?? []), ...(numerology.bestAvailable ?? []), ...(numerology.watchlist ?? [])];
          const withOrder = surfaced.filter((row) => Number.isInteger(row.battingOrder));
          if (!withOrder.length) throw new Error('No surfaced numerology player has a batting order.');

          for (const play of numerology.bestAvailable ?? []) {
            if (!Array.isArray(play.positiveSignals) || !Array.isArray(play.counterSignals)) {
              throw new Error(`Best-available trace missing for ${play.playerName}`);
            }
          }

          const exactSlot = numerology.dailyProfile.universalDayRoot;
          const exactMatches = (raw.batters ?? []).filter((row) => row.battingOrder === exactSlot).length;
          console.log(`Published batting orders: ${battingRows.length}/${raw.batters.length}`);
          console.log(`Surfaced players with batting order: ${withOrder.length}/${surfaced.length}`);
          console.log(`Players batting in exact daily slot #${exactSlot}: ${exactMatches}`);
          NODE
        env:
          EXPECTED_DATE: ${{ steps.date.outputs.date }}

      - name: Run numerology tests
        run: npx vitest run src/lib/numerology/numerology.test.ts

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Commit validated update
        shell: bash
        run: |
          rm -f scripts/apply-numerology-lineup-alignment.py
          rm -f .github/workflows/apply-test-numerology-lineup-alignment.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            scripts/generate-mlb-hr-props.mjs \
            scripts/generate-mlb-numerology.mjs \
            src/pages/MlbNumerologyPage.tsx \
            public/data/mlb/hr-props-raw.json \
            public/data/mlb/hr-props-best-bets.json \
            public/data/mlb/numerology-daily.json \
            public/data/mlb/numerology/history/ \
            public/data/mlb/player-identity-cache.json \
            scripts/apply-numerology-lineup-alignment.py \
            .github/workflows/apply-test-numerology-lineup-alignment.yml

          git commit -m "fix: score projected lineup positions in MLB numerology"
          git push origin HEAD:test/mlb-model-drivers-footer
