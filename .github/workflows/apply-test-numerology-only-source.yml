name: Enforce test numerology-only matching

on:
  push:
    branches:
      - test/mlb-model-drivers-footer
    paths:
      - .github/workflows/apply-test-numerology-only-source.yml

permissions:
  contents: write

concurrency:
  group: test-numerology-only-source
  cancel-in-progress: false

jobs:
  patch-validate-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TZ: America/New_York

    steps:
      - name: Check out test branch
        uses: actions/checkout@v4
        with:
          ref: test/mlb-model-drivers-footer
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Patch generator permanently
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          p = Path('scripts/generate-mlb-numerology.mjs')
          text = p.read_text()

          def rep(old, new, label):
              global text
              if old not in text:
                  raise SystemExit(f'Missing expected block: {label}')
              text = text.replace(old, new, 1)

          rep('Methodology v2.0.0', 'Methodology v2.1.0', 'header version')

          rep('''    const bbScore = baseballScore(batter);
              const finalScore = Math.round(W.numerologyWeight * numerologyScore + W.baseballWeight * bbScore);
              const market = selectMarket(batter);''', '''    const bbScore = baseballScore(batter);
              // Alignment is determined only by numerology. Baseball opportunity is
              // retained as context but cannot affect selection, rank, or qualification.
              const finalScore = numerologyScore;
              const market = selectMarket(batter);''', 'candidate score')

          rep('''  // Rank
            candidates.sort((a, b) => b.finalScore - a.finalScore);
            candidates.forEach((c, i) => { c.rank = i + 1; });

            const featured = candidates.filter(c => c.finalScore >= 60).slice(0, 5);
            const bestAvailable = featured.length < 3
              ? candidates.filter(c => c.finalScore < 60).slice(0, 3 - featured.length)
              : [];
            const watchlist = candidates.filter(c => c.finalScore < 60 && c.finalScore >= 45).slice(0, 6);''', '''  // Rank exclusively by numerology. Tie-breakers are also numerology-only.
            candidates.sort((a, b) =>
              b.numerologyScore - a.numerologyScore ||
              b.positiveTotal - a.positiveTotal ||
              b.convergenceBonus - a.convergenceBonus ||
              a.countercurrentTotal - b.countercurrentTotal ||
              a.playerName.localeCompare(b.playerName)
            );
            candidates.forEach((c, i) => { c.rank = i + 1; });

            const featured = candidates.filter(c => c.numerologyScore >= 60).slice(0, 5);
            const bestAvailable = featured.length < 3
              ? candidates.filter(c => c.numerologyScore < 60).slice(0, 3 - featured.length)
              : [];
            const watchlist = candidates.filter(c => c.numerologyScore < 60 && c.numerologyScore >= 45).slice(0, 6);''', 'ranking block')

          rep('''  // 60/40 formula check on each featured play
            for (const play of (output.featuredPlays ?? [])) {
              const expected = Math.round(W.numerologyWeight * play.numerologyScore + W.baseballWeight * play.baseballScore);
              if (play.finalScore !== expected) {
                errors.push(`finalScore for ${play.playerName}: ${play.finalScore} ≠ expected ${expected}`);
              }
            }''', '''  // Baseball context must never alter an alignment score.
            for (const play of [...(output.featuredPlays ?? []), ...(output.bestAvailable ?? []), ...(output.watchlist ?? [])]) {
              if (play.finalScore !== play.numerologyScore) {
                errors.push(`alignment score for ${play.playerName} must equal numerology score`);
              }
            }
            if (output.rankingBasis !== "numerology_only" || output.baseballContextOnly !== true) {
              errors.push("Missing numerology-only ranking declaration");
            }''', 'output validation')

          rep('''    narrativeSource,
              dataStatus: computeDataStatus(batters, scheduleRoster, confirmedCount),''', '''    narrativeSource,
              rankingBasis: "numerology_only",
              baseballContextOnly: true,
              dataStatus: computeDataStatus(batters, scheduleRoster, confirmedCount),''', 'ranking metadata')

          rep('''      formula: `${Math.round(W.numerologyWeight*100)}% × ${c.numerologyScore} + ${Math.round(W.baseballWeight*100)}% × ${c.baseballScore} = ${c.finalScore}`,
                confidence: c.finalScore >= 75 ? "high" : c.finalScore >= 60 ? "medium" : "low",''', '''      formula: `Numerology alignment: ${c.numerologyScore}. Baseball context: ${c.baseballScore} (not used in rank).`,
                confidence: c.numerologyScore >= 75 ? "high" : c.numerologyScore >= 60 ? "medium" : "low",''', 'featured formula')

          rep('''      lineupStatus: c.lineupStatus,
                battingOrder: c.battingOrder,
                jerseyNumber: c.jerseyNumber,
                recommendedMarket: c.recommendedMarket,
                numerologyScore: c.numerologyScore,
                baseballScore: c.baseballScore,
                finalScore: c.finalScore,
                primarySignal: c.signals.filter(s => s.points > 0)[0]?.label ?? null,
                missingData: c.missingData,
                belowThresholdLabel: "Best available today — below the featured-play threshold",''', '''      opposingPitcher: c.opposingPitcher,
                lineupStatus: c.lineupStatus,
                lineupSource: c.lineupSource,
                battingOrder: c.battingOrder,
                jerseyNumber: c.jerseyNumber,
                recommendedMarket: c.recommendedMarket,
                marketModelSource: c.marketModelSource,
                marketScore: c.marketScore,
                marketSelectionReason: c.marketSelectionReason,
                odds: c.hrOdds ?? null,
                numerologyScore: c.numerologyScore,
                baseballScore: c.baseballScore,
                finalScore: c.numerologyScore,
                formula: `Numerology alignment: ${c.numerologyScore}. Baseball context: ${c.baseballScore} (not used in rank).`,
                confidence: c.numerologyScore >= 75 ? "high" : c.numerologyScore >= 60 ? "medium" : "low",
                positiveSignals: c.signals.filter(s => s.points > 0),
                counterSignals: c.signals.filter(s => s.points < 0),
                primarySignal: c.signals.filter(s => s.points > 0)[0]?.label ?? null,
                missingData: c.missingData,
                summary: getNarrative(c.rank).summary ?? "Best available numerology alignment; baseball context did not affect this ranking.",
                belowThresholdLabel: "Best available today — below the numerology threshold",''', 'best available trace')

          rep('''    scoringConfiguration: { weights: W, methodologyVersion: METHODOLOGY_VERSION },''', '''    scoringConfiguration: {
                weights: W,
                methodologyVersion: METHODOLOGY_VERSION,
                rankingBasis: "numerology_only",
                baseballContextOnly: true,
              },''', 'scoring metadata')

          p.write_text(text)
          PY

      - name: Resolve current Eastern date
        id: slate
        run: echo "date=$(TZ=America/New_York date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Replace current archive and regenerate
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          rm -f "public/data/mlb/numerology/history/${{ steps.slate.outputs.date }}.json"
          node scripts/generate-mlb-numerology.mjs --date "${{ steps.slate.outputs.date }}"

      - name: Validate numerology-only ranking
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('public/data/mlb/numerology-daily.json', 'utf8'));
          const all = [...(report.featuredPlays ?? []), ...(report.bestAvailable ?? []), ...(report.watchlist ?? [])];
          if (report.rankingBasis !== 'numerology_only' || report.baseballContextOnly !== true) throw new Error('Missing ranking metadata');
          for (const p of all) {
            if (p.finalScore !== p.numerologyScore) throw new Error(`${p.playerName}: baseball affected alignment`);
          }
          const visible = report.featuredPlays.length ? report.featuredPlays : report.bestAvailable;
          for (let i = 1; i < visible.length; i++) {
            if (visible[i].numerologyScore > visible[i - 1].numerologyScore) throw new Error('Visible matches are not numerology-ranked');
          }
          for (const p of report.bestAvailable ?? []) {
            if (!Array.isArray(p.positiveSignals) || !Array.isArray(p.counterSignals)) throw new Error(`Missing trace: ${p.playerName}`);
          }
          console.log(all.slice(0, 5).map(p => `${p.playerName}: N${p.numerologyScore}, B${p.baseballScore}`).join(' | '));
          NODE

      - name: Run tests and build
        run: |
          npx vitest run src/lib/numerology/numerology.test.ts
          npx tsc --noEmit
          npm run build

      - name: Commit validated source and data
        shell: bash
        run: |
          rm -f .github/workflows/apply-test-numerology-only-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/generate-mlb-numerology.mjs public/data/mlb/numerology-daily.json public/data/mlb/numerology/history/ .github/workflows/apply-test-numerology-only-source.yml
          git commit -m "fix: enforce numerology-only MLB alignment ranking"
          git push origin HEAD:test/mlb-model-drivers-footer
