name: Apply test Polymarket value and pitcher alignment

on:
  push:
    branches:
      - test/mlb-model-drivers-footer

permissions:
  contents: write

concurrency:
  group: test-polymarket-value-and-pitcher-alignment
  cancel-in-progress: false

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out test branch
        uses: actions/checkout@v4
        with:
          ref: test/mlb-model-drivers-footer
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply update
        run: python scripts/apply-polymarket-value-and-pitcher-alignment.py

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Commit validated changes
        run: |
          rm -f scripts/apply-polymarket-value-and-pitcher-alignment.py
          rm -f .github/workflows/apply-test-polymarket-value-and-pitcher-alignment.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/MlbGameDetail.tsx src/components/mlb/MlbPolymarketMoneylinePanel.tsx
          git add -u scripts/apply-polymarket-value-and-pitcher-alignment.py .github/workflows/apply-test-polymarket-value-and-pitcher-alignment.yml
          git commit -m "fix: show positive Polymarket value side and align pitcher rows"
          git push origin HEAD:test/mlb-model-drivers-footer
