name: Apply test Universal Day compound fix

on:
  push:
    branches:
      - test/mlb-model-drivers-footer
    paths:
      - .github/workflows/apply-test-universal-day-compound-fix.yml

permissions:
  contents: write

concurrency:
  group: test-universal-day-compound-fix
  cancel-in-progress: false

jobs:
  apply-generate-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: America/New_York

    steps:
      - name: Check out test branch
        uses: actions/checkout@v4
        with:
          ref: test/mlb-model-drivers-footer
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply compound-label fix
        run: python scripts/apply-universal-day-compound-fix.py

      - name: Resolve current Eastern date
        id: date
        shell: bash
        run: echo "date=$(TZ=America/New_York date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Replace corrected current-day archive
        shell: bash
        run: rm -f "public/data/mlb/numerology/history/${{ steps.date.outputs.date }}.json"

      - name: Regenerate current-day numerology
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: node scripts/generate-mlb-numerology.mjs --date "${{ steps.date.outputs.date }}"

      - name: Validate 23/5 public output
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const date = process.env.EXPECTED_DATE;
          const data = JSON.parse(fs.readFileSync('public/data/mlb/numerology-daily.json', 'utf8'));
          const expectedRaw = date.replace(/\D/g, '').split('').reduce((sum, digit) => sum + Number(digit), 0);
          const expectedRoot = String(expectedRaw).split('').reduce((sum, digit) => sum + Number(digit), 0);

          if (data.date !== date) throw new Error(`Expected ${date}, received ${data.date}`);
          if (data.dailyProfile.universalDayRawSum !== expectedRaw) throw new Error('Universal Day raw sum mismatch');
          if (data.dailyProfile.universalDayCompound !== expectedRaw) throw new Error('Public compound did not preserve full-date sum');
          if (data.dailyProfile.universalDayRoot !== expectedRoot) throw new Error('Universal Day root mismatch');
          if (!data.dailyProfile.interpretation.includes(`${expectedRaw}/${expectedRoot}`)) {
            throw new Error(`Interpretation does not include ${expectedRaw}/${expectedRoot}`);
          }

          console.log(`Validated public Universal Day label: ${expectedRaw}/${expectedRoot}`);
          NODE
        env:
          EXPECTED_DATE: ${{ steps.date.outputs.date }}

      - name: Run numerology tests
        run: npx vitest run src/lib/numerology/numerology.test.ts

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Commit validated fix
        shell: bash
        run: |
          rm -f scripts/apply-universal-day-compound-fix.py
          rm -f .github/workflows/apply-test-universal-day-compound-fix.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            src/pages/MlbNumerologyPage.tsx \
            src/lib/numerology/scoring.ts \
            src/lib/numerology/numerology.test.ts \
            scripts/generate-mlb-numerology.mjs \
            public/data/mlb/numerology-daily.json \
            public/data/mlb/numerology/history/ \
            .github/workflows/apply-test-universal-day-compound-fix.yml \
            scripts/apply-universal-day-compound-fix.py

          git commit -m "fix: preserve Universal Day compound in numerology display"
          git push origin HEAD:test/mlb-model-drivers-footer
