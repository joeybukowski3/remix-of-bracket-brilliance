name: Backfill PGA Player History

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: Oldest PGA Tour season to include
        required: false
        default: "2016"
      player_limit:
        description: Optional player limit for a test run; use 0 for all players
        required: false
        default: "0"

permissions:
  contents: write

concurrency:
  group: backfill-pga-history-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh PGA Tour stats and player IDs
        env:
          PGA_API_KEY: ${{ secrets.PGA_API_KEY }}
        run: npm run pga:fetch-stats-fallback

      - name: Backfill PGA Tour tournament history
        env:
          PGA_API_KEY: ${{ secrets.PGA_API_KEY }}
          PGA_HISTORY_START_YEAR: ${{ inputs.start_year }}
          PGA_HISTORY_PLAYER_LIMIT: ${{ inputs.player_limit }}
        run: npm run pga:fetch-history

      - name: Refresh official LIV results
        run: npm run pga:fetch-liv

      - name: Refresh official DP World Tour results
        run: npm run pga:fetch-dpwt

      - name: Generate JKB Trend Rank
        run: npm run pga:trend

      - name: Validate generated JSON
        run: |
          node -e "const fs=require('fs'); ['player-stats-raw.json','player-history.json','major-history.json','round-history-pga.json','round-history-liv.json','round-history-dpwt.json','jkb-trend-rankings.json'].forEach((name)=>JSON.parse(fs.readFileSync('public/data/pga/'+name,'utf8'))); console.log('PGA and JKB Trend JSON validation passed')"

      - name: Run focused PGA tests
        run: npx vitest run src/lib/pga/historyModel.test.ts src/hooks/usePgaPlayerHistory.test.ts

      - name: Verify production build
        run: npm run build

      - name: Commit refreshed history and trend rankings
        shell: bash
        run: |
          FILES=(
            public/data/pga/player-stats-raw.json
            public/data/pga/player-stats-meta.json
            public/data/pga/player-history.json
            public/data/pga/major-history.json
            public/data/pga/round-history-pga.json
            public/data/pga/round-history-liv.json
            public/data/pga/round-history-dpwt.json
            public/data/pga/jkb-trend-rankings.json
          )

          if git diff --quiet -- "${FILES[@]}"; then
            echo "No PGA history or trend changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FILES[@]}"
          git commit -m "Refresh PGA history and JKB trend rankings"
          git push origin "HEAD:${GITHUB_REF_NAME}"
