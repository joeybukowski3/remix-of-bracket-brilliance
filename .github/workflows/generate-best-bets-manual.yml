name: Generate PGA Best Bets Manual

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-best-bets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch FedExCup standings
        id: fedex_standings
        continue-on-error: true
        run: node scripts/fetch-pga-fedex-standings.mjs

      - name: Generate PGA best bets
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: npm run pga:best-bets -- --force

      - name: Commit and push best bets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/pga/best-bets.json
          if [ "${{ steps.fedex_standings.outcome }}" = "success" ]; then
            git add public/data/pga/fedex-standings.json
          fi
          if git diff --cached --quiet; then
            echo "No best bets changes to commit."
            exit 0
          fi
          git commit -m "chore: generate PGA best bets"
          git push origin HEAD:main
