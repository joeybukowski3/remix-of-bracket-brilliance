name: Generate MLB Data

on:
  schedule:
    # 3:00 AM ET — runs regardless of EDT/EST since we want it every day
    - cron: "0 8 * * *"     # 3 AM EST / 4 AM EDT (winter-safe)
    # 11:45 AM ET — afternoon refresh with confirmed starters
    - cron: "45 16 * * *"   # 11:45 AM EST / 12:45 PM EDT (winter-safe)
  workflow_dispatch:

concurrency:
  group: generate-mlb-data
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  generate-mlb-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Step 1: Fetch live odds ───────────────────────────────────────────────
      - name: Fetch MLB odds
        run: node scripts/fetch-mlb-odds.mjs || true
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      # ── Step 2: Generate HR props ─────────────────────────────────────────────
      - name: Generate HR props & best bets
        run: npm run mlb:hr-props -- --force
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      # ── Step 3: Generate pitcher regression ──────────────────────────────────
      - name: Generate pitcher regression
        run: npm run mlb:pitcher-regression
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      # ── Commit all updated MLB data ───────────────────────────────────────────
      - name: Commit updated MLB data
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            public/data/mlb/mlb-odds.json \
            public/data/mlb/hr-props-raw.json \
            public/data/mlb/hr-props-best-bets.json \
            public/data/mlb/pitcher-regression.json
          if git diff --cached --quiet; then
            echo "No MLB data changes — skipping commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh MLB data (odds + HR props + pitcher regression)"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Build & deploy ────────────────────────────────────────────────────────
      - name: Build site
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Deploy to Vercel
        shell: bash
        continue-on-error: true
        run: |
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "::warning::Vercel secrets missing — skipping Vercel deploy."
            exit 0
          fi
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token="${VERCEL_TOKEN}" || exit 0
          vercel build --prod --token="${VERCEL_TOKEN}" || exit 0
          vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}" || exit 0
