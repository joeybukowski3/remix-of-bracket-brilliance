name: Generate MLB HR Props

on:
  schedule:
    # 3 AM ET — initial overnight run (early lineups / overnight markets)
    - cron: "0 7 * * *"   # 3 AM EDT
    - cron: "0 8 * * *"   # 3 AM EST
    # 10 AM ET — second run once most probable pitchers are posted
    - cron: "0 14 * * *"  # 10 AM EDT
    - cron: "0 15 * * *"  # 10 AM EST
    # 1 PM ET — third run when lineups are confirmed for day games
    - cron: "0 17 * * *"  # 1 PM EDT
    - cron: "0 18 * * *"  # 1 PM EST
  workflow_dispatch:
    inputs:
      force:
        description: "Force regeneration outside the scheduled run windows"
        required: false
        default: false
        type: boolean

concurrency:
  group: generate-mlb-hr-props
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  generate-hr-props:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Gate scheduled run to the correct timezone slot
        id: schedule_gate
        shell: bash
        run: |
          SHOULD_RUN="true"
          MESSAGE=""

          if [ "${{ github.event_name }}" = "schedule" ]; then
            ET_ZONE="$(TZ=America/New_York date +%Z)"

            # Map each time slot to the correct UTC cron for EDT vs EST
            # Slot 1: 3 AM ET  → 0 7 (EDT) or 0 8 (EST)
            # Slot 2: 10 AM ET → 0 14 (EDT) or 0 15 (EST)
            # Slot 3: 1 PM ET  → 0 17 (EDT) or 0 18 (EST)
            if [ "$ET_ZONE" = "EDT" ]; then
              VALID_CRONS="0 7 * * *|0 14 * * *|0 17 * * *"
            else
              VALID_CRONS="0 8 * * *|0 15 * * *|0 18 * * *"
            fi

            CURRENT="${{ github.event.schedule }}"
            if echo "$VALID_CRONS" | grep -qF "$CURRENT"; then
              SHOULD_RUN="true"
            else
              SHOULD_RUN="false"
              MESSAGE="Skipping duplicate cron for $ET_ZONE: $CURRENT is not a valid slot."
            fi
          fi

          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"
          echo "message=${MESSAGE}" >> "$GITHUB_OUTPUT"

      - name: Report skipped duplicate cron
        if: steps.schedule_gate.outputs.should_run != 'true'
        run: echo "${{ steps.schedule_gate.outputs.message }}"

      - name: Generate HR props
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            npm run mlb:hr-props -- --force
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            npm run mlb:hr-props -- --force
          else
            npm run mlb:hr-props
          fi
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Commit and push updated MLB HR prop data
        if: steps.schedule_gate.outputs.should_run == 'true'
        id: commit_data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/mlb/hr-props-raw.json public/data/mlb/hr-props-best-bets.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update MLB HR prop data"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build site for GitHub Pages
        if: steps.schedule_gate.outputs.should_run == 'true' && false
        run: npm run build

      - name: Upload GitHub Pages artifact
        if: steps.schedule_gate.outputs.should_run == 'true' && false
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy refreshed site to GitHub Pages
        if: steps.schedule_gate.outputs.should_run == 'true' && false
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Vercel Deployment
        if: steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        continue-on-error: true
        run: |
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "::warning title=Vercel Skip::Skipping Vercel deploy because required secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID) are missing."
            exit 0
          fi

          echo "Installing Vercel CLI..."
          npm install --global vercel@latest

          echo "Validating Vercel token..."
          if ! vercel whoami --token="${VERCEL_TOKEN}" > /dev/null 2>&1; then
            echo "::warning title=Vercel Skip::Skipping Vercel deploy because the provided VERCEL_TOKEN is invalid or expired."
            exit 0
          fi

          echo "Pulling Vercel production settings..."
          if ! vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"; then
            echo "::warning title=Vercel Failure::Failed to pull Vercel settings. Skipping Vercel deploy."
            exit 0
          fi

          echo "Building Vercel production output..."
          if ! vercel build --prod --token="${VERCEL_TOKEN}"; then
            echo "::warning title=Vercel Failure::Failed to build for Vercel. Skipping Vercel deploy."
            exit 0
          fi

          echo "Deploying refreshed site to Vercel production..."
          if ! vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}"; then
            echo "::warning title=Vercel Failure::Failed to deploy to Vercel. Skipping Vercel deploy."
            exit 0
          fi
          
          echo "Successfully deployed to Vercel production."
