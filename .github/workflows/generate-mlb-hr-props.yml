name: Generate MLB Data

on:
  schedule:
    # 3 AM ET — multiple entries increases chance GitHub fires at least one
    - cron: "0 7 * * *"    # 3 AM EDT
    - cron: "0 8 * * *"    # 3 AM EST / 4 AM EDT
    # Noon ET — afternoon refresh
    - cron: "0 16 * * *"   # Noon EDT / 11 AM EST
    - cron: "0 17 * * *"   # 1 PM EDT / Noon EST
  workflow_dispatch:

concurrency:
  group: generate-mlb-data
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  generate-mlb-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch MLB odds
        run: node scripts/fetch-mlb-odds.mjs || true
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Generate HR props & best bets
        run: node scripts/generate-mlb-hr-props.mjs --force
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Generate pitcher regression
        run: node scripts/generate-mlb-pitcher-regression.mjs
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Commit updated MLB data
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Update sitemap lastmod to today so Google recrawls daily pages
          TODAY="$(TZ=America/New_York date '+%Y-%m-%d')"
          sed -i "s/<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}<\/lastmod>/<lastmod>${TODAY}<\/lastmod>/g" public/sitemap.xml

          git add public/data/mlb/ public/sitemap.xml
          if git diff --cached --quiet; then
            echo "No MLB data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh MLB data $(TZ=America/New_York date '+%Y-%m-%d %H:%M ET')"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build site
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Deploy to Vercel
        shell: bash
        continue-on-error: true
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then exit 0; fi
          npm install --global vercel@latest --quiet
          vercel pull --yes --environment=production --token="${VERCEL_TOKEN}" || exit 0
          vercel build --prod --token="${VERCEL_TOKEN}" || exit 0
          vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}" || exit 0
