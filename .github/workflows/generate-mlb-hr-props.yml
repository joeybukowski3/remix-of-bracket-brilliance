name: Generate MLB Data

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/generate-mlb-hr-props.yml'
  schedule:
    # GitHub silently drops scheduled runs under load, especially overnight.
    # Strategy: many hourly attempts through the morning. The script + commit
    # step are idempotent (no-op when data unchanged), so extra runs are free.
    # Each run regenerates for the CURRENT ET date, so the first one to fire
    # after midnight ET produces the correct day's slate.
    - cron: "23 6 * * *"   # 2:23 AM EDT
    - cron: "23 7 * * *"   # 3:23 AM EDT
    - cron: "23 8 * * *"   # 4:23 AM EDT
    - cron: "23 9 * * *"   # 5:23 AM EDT
    - cron: "23 10 * * *"  # 6:23 AM EDT
    - cron: "23 11 * * *"  # 7:23 AM EDT
    - cron: "23 12 * * *"  # 8:23 AM EDT
    - cron: "23 13 * * *"  # 9:23 AM EDT
    - cron: "23 14 * * *"  # 10:23 AM EDT
    - cron: "40 15 * * *"  # 11:40 AM EDT — final pre-game
    - cron: "40 16 * * *"  # 12:40 PM EDT
  workflow_dispatch:

concurrency:
  group: generate-mlb-data
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  generate-mlb-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch MLB odds
        run: node scripts/fetch-mlb-odds.mjs || true
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Fetch team wRC+ data
        run: node scripts/fetch-team-wrc-plus.mjs || true

      - name: Fetch public betting splits
        run: node scripts/fetch-public-betting.mjs || true

      - name: Resolve betting results from prior day
        run: node scripts/resolve-betting-results.mjs || true

      - name: Generate HR props & best bets
        run: node scripts/generate-mlb-hr-props.mjs --force
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Generate pitcher regression
        run: node scripts/generate-mlb-pitcher-regression.mjs
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Commit updated MLB data
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Update sitemap lastmod to today so Google recrawls daily pages
          TODAY="$(TZ=America/New_York date '+%Y-%m-%d')"
          sed -i "s/<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}<\/lastmod>/<lastmod>${TODAY}<\/lastmod>/g" public/sitemap.xml

          git add public/data/mlb/ public/data/betting-splits/ public/sitemap.xml
          if git diff --cached --quiet; then
            echo "No MLB data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh MLB data $(TZ=America/New_York date '+%Y-%m-%d %H:%M ET')"

            # Retry push up to 3 times with rebase — handles concurrent cron runs
            PUSHED=false
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                PUSHED=true
                break
              fi
              echo "Push attempt $attempt failed — pulling and rebasing..."
              git pull --rebase origin main || true
              sleep 5
            done

            if [ "$PUSHED" = "true" ]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "All push attempts failed — build will use locally generated data."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Build site
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Deploy to Vercel
        shell: bash
        continue-on-error: true
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then exit 0; fi
          npm install --global vercel@latest --quiet
          vercel pull --yes --environment=production --token="${VERCEL_TOKEN}" || exit 0
          vercel build --prod --token="${VERCEL_TOKEN}" || exit 0
          vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}" || exit 0
