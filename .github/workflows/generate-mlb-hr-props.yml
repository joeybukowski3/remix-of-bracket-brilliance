```yaml
name: Generate MLB Data

on:
  # Four strategic updates instead of eleven hourly attempts.
  # Times are automatically adjusted for EST/EDT.
  schedule:
    - cron: "23 3 * * *"
      timezone: "America/New_York" # 3:23 AM ET — initial daily slate

    - cron: "23 8 * * *"
      timezone: "America/New_York" # 8:23 AM ET — morning refresh

    - cron: "23 10 * * *"
      timezone: "America/New_York" # 10:23 AM ET — odds and lineup refresh

    - cron: "40 11 * * *"
      timezone: "America/New_York" # 11:40 AM ET — final early-game refresh

  # Allows you to run it manually from the Actions tab.
  workflow_dispatch:

concurrency:
  group: generate-mlb-data
  # Prevent overlapping scheduled runs from creating competing commits.
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate-mlb-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch MLB odds
        run: node scripts/fetch-mlb-odds.mjs || true
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_KEY_BACKUP: ${{ secrets.ODDS_API_KEY_BACKUP }}
          PARLAYAPI: ${{ secrets.PARLAYAPI }}
          THERUNDOWNAPI: ${{ secrets.THERUNDOWNAPI }}

      - name: Fetch team wRC+ data
        run: node scripts/fetch-team-wrc-plus.mjs || true

      - name: Generate HR props and best bets
        run: node scripts/generate-mlb-hr-props.mjs --force
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Generate pitcher regression
        run: node scripts/generate-mlb-pitcher-regression.mjs
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      # Generated JSON files contain timestamps that change every run.
      # This restores a file when timestamps are its only differences,
      # preventing unnecessary commits and Vercel deployments.
      - name: Remove timestamp-only data changes
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const { execFileSync } = require("child_process");

          const volatileKeys = new Set([
            "generatedAt",
            "fetchedAt",
            "updatedAt",
            "lastUpdated",
            "scheduledFor",
            "nextRunAt",
            "lineupDataAsOf",
            "generationStartedAt",
            "generationCompletedAt",
            "actualWorkflowStart"
          ]);

          function clean(value) {
            if (Array.isArray(value)) {
              return value.map(clean);
            }

            if (value && typeof value === "object") {
              return Object.fromEntries(
                Object.entries(value)
                  .filter(([key]) => !volatileKeys.has(key))
                  .sort(([a], [b]) => a.localeCompare(b))
                  .map(([key, child]) => [key, clean(child)])
              );
            }

            return value;
          }

          let changedFiles = [];

          try {
            changedFiles = execFileSync(
              "git",
              [
                "diff",
                "--name-only",
                "--",
                "public/data/mlb",
                "public/data/betting-splits"
              ],
              { encoding: "utf8" }
            )
              .trim()
              .split("\n")
              .filter(Boolean);
          } catch {
            changedFiles = [];
          }

          for (const file of changedFiles) {
            if (!file.endsWith(".json") || !fs.existsSync(file)) {
              continue;
            }

            let previousText;

            try {
              previousText = execFileSync(
                "git",
                ["show", `HEAD:${file}`],
                {
                  encoding: "utf8",
                  stdio: ["ignore", "pipe", "ignore"]
                }
              );
            } catch {
              // New file: keep it.
              continue;
            }

            try {
              const previous = clean(JSON.parse(previousText));
              const current = clean(JSON.parse(fs.readFileSync(file, "utf8")));

              if (JSON.stringify(previous) === JSON.stringify(current)) {
                execFileSync(
                  "git",
                  ["restore", "--worktree", "--source=HEAD", "--", file],
                  { stdio: "inherit" }
                );

                console.log(`Restored timestamp-only file: ${file}`);
              }
            } catch (error) {
              console.warn(
                `Could not compare ${file}; keeping the generated version.`,
                error.message
              );
            }
          }
          NODE

      - name: Detect meaningful MLB data changes
        id: changes
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- public/data/mlb public/data/betting-splits)" ]; then
            echo "No meaningful MLB data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Meaningful MLB data changes detected."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update sitemap date
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          TODAY="$(TZ=America/New_York date '+%Y-%m-%d')"

          sed -i \
            "s/<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}<\/lastmod>/<lastmod>${TODAY}<\/lastmod>/g" \
            public/sitemap.xml

      # Validate the generated site before pushing anything to main.
      - name: Build site
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Commit and push updated MLB data
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            public/data/mlb/ \
            public/data/betting-splits/ \
            public/sitemap.xml

          if git diff --cached --quiet; then
            echo "No staged MLB data changes."
            exit 0
          fi

          git commit -m "chore: refresh MLB data $(TZ=America/New_York date '+%Y-%m-%d %H:%M ET')"

          PUSHED=false

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              PUSHED=true
              break
            fi

            echo "Push attempt ${attempt} failed — pulling and rebasing..."
            git pull --rebase origin main || true
            sleep 5
          done

          if [ "$PUSHED" != "true" ]; then
            echo "All push attempts failed."
            exit 1
          fi

          echo "MLB data pushed successfully."
          echo "Vercel's Git integration will create the production deployment."
```
