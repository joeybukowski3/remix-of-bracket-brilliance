name: Generate MLB HR Props

on:
  schedule:
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force regeneration before 10 AM ET or rerun after today's file already exists"
        required: false
        default: false
        type: boolean

concurrency:
  group: generate-mlb-hr-props
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-hr-props:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate HR props
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            npm run mlb:hr-props -- --force
          else
            npm run mlb:hr-props
          fi
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Commit and push updated MLB HR prop data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/mlb/hr-props-raw.json public/data/mlb/hr-props-best-bets.json
          git diff --cached --quiet || (git commit -m "chore: update MLB HR prop data" && git push)
