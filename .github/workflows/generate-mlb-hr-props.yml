name: Generate MLB HR Props

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  generate-hr-props:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate HR props
        run: npm run mlb:hr-props
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Commit and push updated MLB HR prop data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/mlb/hr-props-raw.json public/data/mlb/hr-props-best-bets.json
          git diff --cached --quiet || (git commit -m "chore: update MLB HR prop data" && git push)
