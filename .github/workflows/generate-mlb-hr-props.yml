name: Generate MLB Data

on:
  schedule:
    # Slot 1: 3:00 AM ET
    - cron: "0 7 * * *"    # 3 AM EDT (UTC-4)
    - cron: "0 8 * * *"    # 3 AM EST (UTC-5)
    # Slot 2: 11:45 AM ET
    - cron: "45 15 * * *"  # 11:45 AM EDT (UTC-4)
    - cron: "45 16 * * *"  # 11:45 AM EST (UTC-5)
  workflow_dispatch:
    inputs:
      force:
        description: "Force regeneration regardless of schedule"
        required: false
        default: false
        type: boolean

concurrency:
  group: generate-mlb-data
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  generate-mlb-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Gate to valid ET time slots only
        id: gate
        shell: bash
        run: |
          # Manual triggers and non-schedule events always run
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For scheduled runs, only allow one cron per slot per day
          # EDT: slot1=0 7, slot2=45 15  |  EST: slot1=0 8, slot2=45 16
          TZ_NAME="$(TZ=America/New_York date +%Z)"
          CURRENT="${{ github.event.schedule }}"

          if [ "$TZ_NAME" = "EDT" ]; then
            VALID="0 7 * * *|45 15 * * *"
          else
            VALID="0 8 * * *|45 16 * * *"
          fi

          if echo "$VALID" | grep -qF "$CURRENT"; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Running MLB data generation (slot: $CURRENT, tz: $TZ_NAME)"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping duplicate cron for $TZ_NAME: $CURRENT"
          fi

      # ── Step 1: Fetch live odds (moneylines + HR props + K props) ─────────────
      - name: Fetch MLB odds
        if: steps.gate.outputs.should_run == 'true'
        run: node scripts/fetch-mlb-odds.mjs || true
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      # ── Step 2: Generate HR props (uses odds from step 1) ────────────────────
      - name: Generate HR props & best bets
        if: steps.gate.outputs.should_run == 'true'
        run: npm run mlb:hr-props -- --force
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      # ── Step 3: Generate pitcher regression data ──────────────────────────────
      - name: Generate pitcher regression
        if: steps.gate.outputs.should_run == 'true'
        run: npm run mlb:pitcher-regression
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      # ── Commit all updated MLB data ───────────────────────────────────────────
      - name: Commit updated MLB data
        if: steps.gate.outputs.should_run == 'true'
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            public/data/mlb/mlb-odds.json \
            public/data/mlb/hr-props-raw.json \
            public/data/mlb/hr-props-best-bets.json \
            public/data/mlb/pitcher-regression.json
          if git diff --cached --quiet; then
            echo "No MLB data changes — skipping commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh MLB data (odds + HR props + pitcher regression)"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Build & deploy ────────────────────────────────────────────────────────
      - name: Build site
        if: steps.gate.outputs.should_run == 'true'
        run: npm run build

      - name: Upload GitHub Pages artifact
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/deploy-pages@v4

      - name: Deploy to Vercel
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        continue-on-error: true
        run: |
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "::warning::Vercel secrets missing — skipping Vercel deploy."
            exit 0
          fi
          npm install --global vercel@latest
          if ! vercel whoami --token="${VERCEL_TOKEN}" > /dev/null 2>&1; then
            echo "::warning::Invalid VERCEL_TOKEN — skipping Vercel deploy."
            exit 0
          fi
          vercel pull --yes --environment=production --token="${VERCEL_TOKEN}" || exit 0
          vercel build --prod --token="${VERCEL_TOKEN}" || exit 0
          vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}" || exit 0
          echo "Deployed to Vercel production."
