name: Generate MLB Numerology

# Twice-daily generation:
#   Phase 1 - Morning:          4:44 AM America/New_York with gated retries
#   Phase 2 - Lineup-confirmed: first active game - 2 hours
#
# Scheduled delivery is best-effort. The runtime gate also advances a stale
# slate immediately in auto mode, so a missed morning cron cannot leave the
# previous day's page published indefinitely.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/generate-mlb-numerology.yml"
      - "scripts/lib/numerology-schedule-gate.mjs"
      - "scripts/lib/numerology-gate-runner.mjs"
      - "scripts/generate-mlb-numerology.mjs"

  schedule:
    - cron: "44 8 * * *"
    - cron: "44 9 * * *"
    - cron: "0,10,20,30,40,50 8-11 * * *"
    - cron: "0,10,20,30,40,50 12-23 * * *"

  workflow_dispatch:
    inputs:
      phase:
        description: "Numerology generation phase"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - morning
          - lineup-confirmed
          - force-refresh
      date:
        description: "Optional Eastern Time slate date (YYYY-MM-DD)"
        required: false
        type: string
      dry_run:
        description: "Generate and validate without committing or writing files"
        required: false
        default: "false"
        type: string
      use_fixture:
        description: "Write to fixture path only - never overwrites production"
        required: false
        default: "false"
        type: string

concurrency:
  group: mlb-numerology-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-numerology:
    name: Generate MLB Numerology
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Evaluate scheduling gate
        id: gate
        run: |
          node scripts/lib/numerology-gate-runner.mjs \
            --phase "${{ inputs.phase || 'auto' }}"

      - name: Log gate result
        run: |
          echo "run=${{ steps.gate.outputs.run }}"
          echo "phase=${{ steps.gate.outputs.phase }}"
          echo "reason=${{ steps.gate.outputs.reason }}"

      - name: Run numerology unit tests
        if: steps.gate.outputs.run == 'true'
        run: npx vitest run src/lib/numerology/numerology.test.ts

      - name: TypeScript check
        if: steps.gate.outputs.run == 'true'
        run: npx tsc --noEmit

      - name: Production build
        if: steps.gate.outputs.run == 'true'
        run: npm run build

      - name: Update player identity cache
        if: steps.gate.outputs.run == 'true'
        run: node scripts/update-player-identity-cache.mjs

      - name: Generate numerology
        if: steps.gate.outputs.run == 'true'
        id: generate
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          DATE_FLAG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_FLAG="--date ${{ inputs.date }}"
          fi
          DRY_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          FIXTURE_FLAG=""
          if [ "${{ inputs.use_fixture }}" = "true" ]; then
            FIXTURE_FLAG="--fixture"
          fi
          PHASE_FLAG="--phase ${{ steps.gate.outputs.phase }}"
          node scripts/generate-mlb-numerology.mjs $DATE_FLAG $DRY_FLAG $FIXTURE_FLAG $PHASE_FLAG

      - name: Filter to likely active hitters
        if: >-
          steps.gate.outputs.run == 'true' &&
          inputs.dry_run != 'true' &&
          inputs.use_fixture != 'true'
        run: |
          DATE_FLAG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_FLAG="--date ${{ inputs.date }}"
          fi
          node scripts/filter-mlb-numerology-active.mjs $DATE_FLAG

      - name: Commit and push
        if: >-
          steps.gate.outputs.run == 'true' &&
          inputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            public/data/mlb/numerology-daily.json \
            public/data/mlb/numerology/ \
            public/data/mlb/player-identity-cache.json \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No numerology changes to commit."
            exit 0
          fi

          PHASE_LABEL="${{ steps.gate.outputs.phase }}"
          git commit -m "chore: numerology ${PHASE_LABEL} $(TZ=America/New_York date '+%Y-%m-%d %H:%M ET')"

          pushed=false
          for attempt in 1 2 3 4 5; do
            echo "Push attempt ${attempt}/5"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase failed on attempt ${attempt}; aborting before retry." >&2
              git rebase --abort || true
            elif git push origin HEAD:main; then
              pushed=true
              break
            fi
            sleep $((attempt * 10))
          done

          if [ "$pushed" != "true" ]; then
            echo "ERROR: All push attempts failed." >&2
            exit 1
          fi
