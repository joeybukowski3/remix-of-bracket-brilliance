name: Apply Numerology Context Labels

on:
  push:
    branches:
      - test/mlb-model-drivers-footer
    paths:
      - config/numerology-ui-refresh.txt

permissions:
  contents: write

jobs:
  update-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check out test branch
        uses: actions/checkout@v4
        with:
          ref: test/mlb-model-drivers-footer
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update numerology page labels
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('src/pages/MlbNumerologyPage.tsx')
          text = p.read_text()
          replacements = [
            ('type SortMode = "final" | "numerology" | "baseball" | "battingOrder";', 'type SortMode = "numerology" | "baseball" | "battingOrder";'),
            ('const [sort, setSort] = useState<SortMode>("final");', 'const [sort, setSort] = useState<SortMode>("numerology");'),
            ('<option value="final">Final score</option><option value="numerology">Numerology</option><option value="baseball">Baseball</option><option value="battingOrder">Batting order</option>', '<option value="numerology">Numerology alignment</option><option value="baseball">Baseball context</option><option value="battingOrder">Batting order</option>'),
            ('<div><span className="font-semibold text-white/60">Final Score Formula:</span> 60% Numerology Resonance + 40% Baseball Opportunity.</div>', '<div><span className="font-semibold text-white/60">Alignment ranking:</span> Numerology Resonance only. Baseball Opportunity is displayed as context and never affects selection, qualification, or rank.</div>'),
            ('<div className="mb-1 flex justify-between"><span className="text-[9px] text-white/30">Baseball</span><span className="text-[9px] font-bold text-sky-300">{play.baseballScore}</span></div>', '<div className="mb-1 flex justify-between"><span className="text-[9px] text-white/30">Baseball context <span className="text-white/15">(not ranked)</span></span><span className="text-[9px] font-bold text-sky-300">{play.baseballScore}</span></div>'),
            ('This experimental feature analyzes numerical patterns for research and entertainment. It does not guarantee player performance.', 'This experimental feature analyzes numerical patterns for research and entertainment. Players are selected and ranked only by numerology; baseball ratings are separate context and never affect alignment.'),
            ("No player on today's slate has reached qualifying alignment.", "No player on today's slate has reached the numerology-only qualifying threshold."),
            ('Conflicting or opposing patterns. These are not predicted failures — they represent tension between numerical fields and baseball opportunity.', 'Conflicting or opposing numerical patterns. These are not predicted failures. Baseball context is displayed separately and does not affect classification.'),
            ('Strong numerical overlap can coexist with poor baseball opportunity. Unknown data is shown as unknown.', 'Players are selected and ranked only by numerology. Baseball opportunity is context only and may support or conflict with a match without changing its alignment score.'),
          ]
          for old, new in replacements:
            if old not in text:
              raise SystemExit(f'Missing expected page text: {old[:70]}')
            text = text.replace(old, new, 1)
          p.write_text(text)
          PY

      - name: TypeScript check
        run: |
          npm ci
          npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Commit page update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/MlbNumerologyPage.tsx
          git commit -m "fix: label baseball as context-only in numerology"
          git push origin HEAD:test/mlb-model-drivers-footer
