name: MLB Numerology Email Reliable Delivery

# Manual/rescue-only email delivery workflow. Automatic delivery moved to
# poll-mlb-numerology-delivery.yml, which shares ONE frozen, confirmed-
# lineup selection artifact between the email delivery job and the X poster
# (first-pitch-relative 120/75/30-minute timing, confirmed-lineup-only
# eligibility -- see that workflow's header comment). This file still owns
# manual operator access (e.g. an explicit override date) and, via the
# fixed DST-paired schedule below being removed, no longer competes with the
# automated path for the same daily send -- it is dispatch-only now.
on:
  workflow_dispatch:
    inputs:
      date:
        description: "Optional Eastern Time slate date (YYYY-MM-DD)"
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - .github/workflows/mlb-numerology-email-rescue.yml

concurrency:
  group: main-data-writers-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  slate-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_games: ${{ steps.slate.outputs.has_games }}
      game_count: ${{ steps.slate.outputs.game_count }}
      slate_date: ${{ steps.slate.outputs.slate_date }}
      reason: ${{ steps.slate.outputs.reason }}
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check official MLB slate
        id: slate
        env:
          REQUESTED_SLATE_DATE: ${{ github.event_name == 'workflow_dispatch' && inputs.date || '' }}
        run: node scripts/lib/mlb-slate-gate.mjs --date "$REQUESTED_SLATE_DATE"

      - name: Summarize blank slate no-op
        if: steps.slate.outputs.has_games == 'false'
        env:
          SLATE_DATE: ${{ steps.slate.outputs.slate_date }}
        shell: bash
        run: |
          echo "## MLB Numerology Email Reliable Delivery" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No MLB games scheduled for ${SLATE_DATE} ET. Numerology email delivery completed as a successful no-op." | tee -a "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preserved the previous valid numerology data." >> "$GITHUB_STEP_SUMMARY"
          echo "- No email content was generated." >> "$GITHUB_STEP_SUMMARY"
          echo "- No email providers, retries, or delivery verification were called." >> "$GITHUB_STEP_SUMMARY"
          echo "- No commit or push was attempted." >> "$GITHUB_STEP_SUMMARY"

  deliver-email:
    needs: slate-check
    if: needs.slate-check.outputs.has_games == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for fresh data and confirm email is missing
        id: receipt
        shell: bash
        run: |
          set -euo pipefail
          slate_date="${{ needs.slate-check.outputs.slate_date }}"

          for attempt in $(seq 1 46); do
            git fetch origin main
            git reset --hard origin/main

            data_date="$(jq -r '.date // empty' public/data/mlb/numerology-daily.json 2>/dev/null || true)"
            sent_date="$(jq -r '.date // empty' public/data/mlb/numerology/email-send-state.json 2>/dev/null || true)"
            sent_result="$(jq -r '.result // empty' public/data/mlb/numerology/email-send-state.json 2>/dev/null || true)"
            sent_at="$(jq -r '.sentAt // empty' public/data/mlb/numerology/email-send-state.json 2>/dev/null || true)"
            echo "attempt=${attempt}/46 slate_date=${slate_date} data_date=${data_date} sent_date=${sent_date} sent_result=${sent_result}"

            if [ "$sent_date" = "$slate_date" ] && { [ "$sent_result" = "sent" ] || [ "$sent_result" = "already_exists" ] || { [ -z "$sent_result" ] && [ -n "$sent_at" ]; }; }; then
              echo "send=false" >> "$GITHUB_OUTPUT"
              echo "The target slate email is already recorded as delivered."
              exit 0
            fi

            if [ "$data_date" = "$slate_date" ]; then
              echo "send=true" >> "$GITHUB_OUTPUT"
              echo "Fresh target-slate data is available and its receipt is absent."
              exit 0
            fi

            if [ "$attempt" -lt 46 ]; then
              sleep 60
            fi
          done

          echo "::error::Fresh numerology data did not become available for ${slate_date}."
          exit 1

      - name: Set up Node
        if: steps.receipt.outputs.send == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.receipt.outputs.send == 'true'
        run: npm ci

      - name: Run numerology tracking unit tests
        if: steps.receipt.outputs.send == 'true'
        run: npx vitest run src/lib/mlb/mlbNumerologyTracking.test.ts

      - name: Generate today's email payload
        if: steps.receipt.outputs.send == 'true'
        run: npm run mlb:numerology:email:preview

      - name: Send today's Buttondown email
        if: steps.receipt.outputs.send == 'true'
        env:
          NUMEROLOGY_EMAIL_LIVE: "true"
          NUMEROLOGY_EMAIL_WEBHOOK_URL: ${{ secrets.NUMEROLOGY_EMAIL_WEBHOOK_URL || vars.NUMEROLOGY_EMAIL_WEBHOOK_URL }}
          NUMEROLOGY_EMAIL_WEBHOOK_TOKEN: ${{ secrets.NUMEROLOGY_EMAIL_WEBHOOK_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$NUMEROLOGY_EMAIL_WEBHOOK_URL" || { echo "::error::NUMEROLOGY_EMAIL_WEBHOOK_URL is not configured."; exit 1; }
          test -n "$NUMEROLOGY_EMAIL_WEBHOOK_TOKEN" || { echo "::error::NUMEROLOGY_EMAIL_WEBHOOK_TOKEN is not configured."; exit 1; }
          npm run mlb:numerology:email:send

      - name: Persist send receipt
        if: steps.receipt.outputs.send == 'true'
        env:
          SLATE_DATE: ${{ needs.slate-check.outputs.slate_date }}
        shell: bash
        run: bash scripts/lib/persist-mlb-numerology-email-receipt.sh
