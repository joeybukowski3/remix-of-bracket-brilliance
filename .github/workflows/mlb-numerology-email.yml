name: MLB Numerology Email
run-name: MLB Numerology Email • ${{ github.event_name }} • ${{ inputs.mode || 'auto' }}

# Manual dispatch supports preview/send. Scheduled delivery attempts run at
# 4:15 AM, 7:00 AM, and 10:00 AM America/New_York. A persisted send receipt
# prevents later retries from sending a duplicate after an earlier success.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "preview (generate + persist data, no email) or send (send through the gated Buttondown receiver)"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - send
      date:
        description: "Optional Eastern Time slate date (YYYY-MM-DD). Defaults to today ET."
        required: false
        type: string

  schedule:
    # Primary 4:15 AM ET attempt, DST-safe.
    - cron: "15 8 * * *"
    - cron: "15 9 * * *"
    # First retry at 7:00 AM ET, DST-safe.
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
    # Final retry at 10:00 AM ET, DST-safe.
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"

concurrency:
  group: main-data-writers-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  numerology-email:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve requested mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          resolved="preview"
          reason="default preview"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" = "send" ]; then
            resolved="send"
            reason="manual send requested"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            today_et="$(TZ=America/New_York date '+%Y-%m-%d')"
            sent_date="$(jq -r '.date // empty' public/data/mlb/numerology/email-send-state.json 2>/dev/null)" || sent_date=""

            if [ "$sent_date" = "$today_et" ]; then
              resolved="skip"
              reason="email already sent for ${today_et}"
            else
              et_time="$(TZ=America/New_York date '+%H:%M')"
              et_hour="${et_time%:*}"
              et_minute="${et_time#*:}"
              minute_of_day=$((10#$et_hour * 60 + 10#$et_minute))
              primary_start=$((4 * 60 + 15))
              primary_end=$((5 * 60))
              retry_one_start=$((7 * 60))
              retry_one_end=$((7 * 60 + 20))
              retry_two_start=$((10 * 60))
              retry_two_end=$((10 * 60 + 20))

              if [ "$minute_of_day" -ge "$primary_start" ] && [ "$minute_of_day" -le "$primary_end" ]; then
                resolved="send"
                reason="scheduled primary attempt (${et_time} ET)"
              elif [ "$minute_of_day" -ge "$retry_one_start" ] && [ "$minute_of_day" -le "$retry_one_end" ]; then
                resolved="send"
                reason="scheduled 7:00 ET retry (${et_time} ET)"
              elif [ "$minute_of_day" -ge "$retry_two_start" ] && [ "$minute_of_day" -le "$retry_two_end" ]; then
                resolved="send"
                reason="scheduled 10:00 ET retry (${et_time} ET)"
              else
                resolved="skip"
                reason="DST-safe cron candidate outside an allowed ET send window (${et_time} ET)"
              fi
            fi
          fi

          echo "resolved=${resolved}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          echo "[mlb-numerology-email] event=${{ github.event_name }} resolved_mode=${resolved} reason=${reason}"

      - name: Wait for fresh numerology data before scheduled send
        if: github.event_name == 'schedule' && steps.mode.outputs.resolved == 'send'
        shell: bash
        run: |
          set -euo pipefail
          today_et="$(TZ=America/New_York date '+%Y-%m-%d')"
          echo "[mlb-numerology-email] Waiting for numerology-daily.json date=${today_et}."

          for attempt in $(seq 1 46); do
            echo "[mlb-numerology-email] Freshness check attempt ${attempt}/46"
            git fetch origin main
            git reset --hard origin/main

            file_date="$(jq -r '.date // "missing"' public/data/mlb/numerology-daily.json 2>/dev/null)" || file_date="missing"
            sent_date="$(jq -r '.date // empty' public/data/mlb/numerology/email-send-state.json 2>/dev/null)" || sent_date=""

            if [ "$sent_date" = "$today_et" ]; then
              echo "[mlb-numerology-email] Another attempt already sent today's email. Exiting successfully."
              exit 0
            fi
            if [ "$file_date" = "$today_et" ]; then
              echo "[mlb-numerology-email] Fresh numerology data found."
              exit 0
            fi

            if [ "$attempt" -lt 46 ]; then
              sleep 60
            fi
          done

          echo "::error::Scheduled attempt blocked: numerology-daily.json did not update to ${today_et}. No email was sent."
          exit 1

      - name: Re-check send receipt after freshness wait
        id: receipt
        if: steps.mode.outputs.resolved == 'send'
        shell: bash
        run: |
          today_et="$(TZ=America/New_York date '+%Y-%m-%d')"
          sent_date="$(jq -r '.date // empty' public/data/mlb/numerology/email-send-state.json 2>/dev/null)" || sent_date=""
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$sent_date" = "$today_et" ]; then
            echo "already_sent=true" >> "$GITHUB_OUTPUT"
            echo "Today's email was already sent; this retry will stop."
          else
            echo "already_sent=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.mode.outputs.resolved != 'skip' && steps.receipt.outputs.already_sent != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.mode.outputs.resolved != 'skip' && steps.receipt.outputs.already_sent != 'true'
        run: npm ci

      - name: Check data dependencies
        if: steps.mode.outputs.resolved != 'skip' && steps.receipt.outputs.already_sent != 'true'
        shell: bash
        run: |
          if [ ! -f public/data/mlb/numerology-daily.json ]; then
            echo "::error::Missing public/data/mlb/numerology-daily.json."
            exit 1
          fi
          if [ ! -f public/data/mlb/hr-props-raw.json ]; then
            echo "::warning::HR enrichment context is unavailable; numerology ranking is unaffected."
          fi

      - name: Run numerology tracking unit tests
        if: steps.mode.outputs.resolved != 'skip' && steps.receipt.outputs.already_sent != 'true'
        run: npx vitest run src/lib/mlb/mlbNumerologyTracking.test.ts

      - name: Generate email preview
        if: steps.mode.outputs.resolved != 'skip' && steps.receipt.outputs.already_sent != 'true'
        shell: bash
        run: |
          DATE_FLAG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_FLAG="--date ${{ inputs.date }}"
          fi
          npm run mlb:numerology:email:preview -- $DATE_FLAG

      - name: Log resolved mode
        if: always()
        shell: bash
        run: |
          echo "[mlb-numerology-email] Resolved mode: ${{ steps.mode.outputs.resolved }}"
          echo "[mlb-numerology-email] Reason: ${{ steps.mode.outputs.reason }}"
          echo "[mlb-numerology-email] Already sent: ${{ steps.receipt.outputs.already_sent || 'n/a' }}"

      - name: Send Buttondown email (gated)
        if: steps.mode.outputs.resolved == 'send' && steps.receipt.outputs.already_sent != 'true'
        env:
          NUMEROLOGY_EMAIL_LIVE: "true"
          NUMEROLOGY_EMAIL_WEBHOOK_URL: ${{ secrets.NUMEROLOGY_EMAIL_WEBHOOK_URL || vars.NUMEROLOGY_EMAIL_WEBHOOK_URL }}
          NUMEROLOGY_EMAIL_WEBHOOK_TOKEN: ${{ secrets.NUMEROLOGY_EMAIL_WEBHOOK_TOKEN }}
        shell: bash
        run: |
          if [ -z "${NUMEROLOGY_EMAIL_WEBHOOK_URL}" ]; then
            echo "::error::NUMEROLOGY_EMAIL_WEBHOOK_URL is not configured."
            exit 1
          fi
          if [ -z "${NUMEROLOGY_EMAIL_WEBHOOK_TOKEN}" ]; then
            echo "::error::NUMEROLOGY_EMAIL_WEBHOOK_TOKEN is not configured."
            exit 1
          fi
          DATE_FLAG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_FLAG="--date ${{ inputs.date }}"
          fi
          npm run mlb:numerology:email:send -- $DATE_FLAG

      - name: Detect meaningful tracking data changes
        id: changes
        if: steps.mode.outputs.resolved != 'skip' && steps.receipt.outputs.already_sent != 'true'
        shell: bash
        run: |
          FILES="public/data/mlb/numerology/daily-card.json public/data/mlb/numerology/archive public/data/mlb/numerology/performance.json public/data/mlb/numerology/performance-summary.json public/data/mlb/numerology/email-send-state.json"
          if [ -z "$(git status --porcelain -- $FILES)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push tracking data
        if: steps.mode.outputs.resolved != 'skip' && steps.receipt.outputs.already_sent != 'true' && steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            public/data/mlb/numerology/daily-card.json \
            public/data/mlb/numerology/performance.json \
            public/data/mlb/numerology/performance-summary.json \
            public/data/mlb/numerology/email-send-state.json
          if [ -d public/data/mlb/numerology/archive ]; then
            git add public/data/mlb/numerology/archive
          fi

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "chore: numerology email tracking $(TZ=America/New_York date '+%Y-%m-%d %H:%M ET')"

          pushed=false
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
            elif git push origin HEAD:main; then
              pushed=true
              break
            fi
            sleep $((attempt * 10))
          done

          if [ "$pushed" != "true" ]; then
            echo "ERROR: All push attempts failed." >&2
            exit 1
          fi

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "== MLB Numerology Email summary =="
          echo "event: ${{ github.event_name }}"
          echo "resolved mode: ${{ steps.mode.outputs.resolved }}"
          echo "reason: ${{ steps.mode.outputs.reason }}"
          echo "already sent: ${{ steps.receipt.outputs.already_sent || 'n/a' }}"
          echo "tracking data changed: ${{ steps.changes.outputs.changed || 'n/a' }}"