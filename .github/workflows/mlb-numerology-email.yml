name: MLB Numerology Email
run-name: MLB Numerology Email • ${{ github.event_name }} • ${{ inputs.mode || 'auto' }}

# Manual dispatch still supports preview/send. Scheduled runs are now allowed
# to send automatically only inside the 4:15-4:45 AM America/New_York window,
# with a stale-data guard that refuses to send yesterday's slate.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "preview (generate + persist data, no email) or send (send through the gated Buttondown receiver)"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - send
      date:
        description: "Optional Eastern Time slate date (YYYY-MM-DD). Defaults to today ET."
        required: false
        type: string

  schedule:
    # 4:15 AM ET scheduled email, DST-safe. The workflow's ET guard allows
    # only the run that actually lands between 4:15 and 4:45 New York time.
    - cron: "15 8 * * *"
    - cron: "15 9 * * *"

  push:
    branches:
      - main
    paths:
      - ".github/workflows/mlb-numerology-email.yml"
      - "scripts/generate-mlb-numerology-email.mjs"
      - "scripts/lib/mlb-numerology-tracking.mjs"
      - "scripts/lib/mlb-numerology-player-context.mjs"

# Shares the lock with other workflows that commit generated data to main,
# including the 4:00 AM numerology generation workflow. This keeps the email
# tracking commit from racing the upstream page/data update.
concurrency:
  group: main-data-writers-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  numerology-email:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve requested mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          resolved="preview"
          reason="default preview"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" = "send" ]; then
            resolved="send"
            reason="manual send requested"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            et_time="$(TZ=America/New_York date '+%H:%M')"
            et_hour="${et_time%:*}"
            et_minute="${et_time#*:}"
            minute_of_day=$((10#$et_hour * 60 + 10#$et_minute))
            window_start=$((4 * 60 + 15))
            window_end=$((4 * 60 + 45))
            if [ "$minute_of_day" -ge "$window_start" ] && [ "$minute_of_day" -le "$window_end" ]; then
              resolved="send"
              reason="scheduled 4:15 ET send window (${et_time} ET)"
            else
              resolved="skip"
              reason="scheduled run outside 4:15-4:45 ET send window (${et_time} ET)"
            fi
          fi

          echo "resolved=${resolved}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          echo "[mlb-numerology-email] event=${{ github.event_name }} requested_mode_input=${{ inputs.mode || 'n/a' }} resolved_mode=${resolved} reason=${reason}"

      - name: Wait for fresh 4 AM numerology data before scheduled send
        if: github.event_name == 'schedule' && steps.mode.outputs.resolved == 'send'
        shell: bash
        run: |
          set -euo pipefail
          today_et="$(TZ=America/New_York date '+%Y-%m-%d')"
          echo "[mlb-numerology-email] Waiting for numerology-daily.json date=${today_et} before sending."

          for attempt in $(seq 1 13); do
            echo "[mlb-numerology-email] Freshness check attempt ${attempt}/13"
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f public/data/mlb/numerology-daily.json ]; then
              file_date="missing"
            else
              file_date="$(python3 - <<'PY'
import json
from pathlib import Path
path = Path('public/data/mlb/numerology-daily.json')
try:
    print(json.loads(path.read_text()).get('date') or 'missing')
except Exception:
    print('invalid-json')
PY
)"
            fi

            echo "[mlb-numerology-email] numerology-daily.json date=${file_date}; expected=${today_et}"
            if [ "${file_date}" = "${today_et}" ]; then
              echo "[mlb-numerology-email] Fresh numerology data found. Continuing to scheduled send."
              exit 0
            fi

            if [ "$attempt" -lt 13 ]; then
              sleep 60
            fi
          done

          echo "::error::Scheduled send blocked: numerology-daily.json did not update to ${today_et}. No email was sent."
          exit 1

      - name: Set up Node
        if: steps.mode.outputs.resolved != 'skip'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.mode.outputs.resolved != 'skip'
        run: npm ci

      # Fails clearly (does not silently continue) when the live board
      # payload the email is built from does not exist yet. HR props are
      # optional enrichment and are allowed to be missing.
      - name: Check data dependencies
        if: steps.mode.outputs.resolved != 'skip'
        shell: bash
        run: |
          if [ ! -f public/data/mlb/numerology-daily.json ]; then
            echo "::error::Missing public/data/mlb/numerology-daily.json. Run the 'Generate MLB Numerology' workflow (scripts/generate-mlb-numerology.mjs) first -- it is the required upstream data source for this email."
            exit 1
          fi
          if [ ! -f public/data/mlb/hr-props-raw.json ]; then
            echo "::warning::public/data/mlb/hr-props-raw.json is missing. HR enrichment context will show as unavailable; numerology ranking is unaffected."
          fi

      - name: Run numerology tracking unit tests
        if: steps.mode.outputs.resolved != 'skip'
        run: npx vitest run src/lib/mlb/mlbNumerologyTracking.test.ts

      - name: Generate email preview
        if: steps.mode.outputs.resolved != 'skip'
        shell: bash
        run: |
          DATE_FLAG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_FLAG="--date ${{ inputs.date }}"
          fi
          npm run mlb:numerology:email:preview -- $DATE_FLAG

      - name: Log resolved mode
        if: always()
        shell: bash
        run: |
          echo "[mlb-numerology-email] Resolved mode: ${{ steps.mode.outputs.resolved }}"
          echo "[mlb-numerology-email] Reason: ${{ steps.mode.outputs.reason }}"
          if [ "${{ steps.mode.outputs.resolved }}" = "skip" ]; then
            echo "[mlb-numerology-email] Skipped safely -- outside scheduled send window."
          elif [ "${{ steps.mode.outputs.resolved }}" = "preview" ]; then
            echo "[mlb-numerology-email] Preview only -- no Buttondown email will be created."
          else
            echo "[mlb-numerology-email] Send mode -- posting to gated Buttondown receiver."
          fi

      # Only reached when mode resolved to "send". The script itself
      # re-checks NUMEROLOGY_EMAIL_LIVE and NUMEROLOGY_EMAIL_WEBHOOK_URL and
      # throws (failing the step) rather than posting silently if either is
      # missing. The receiver controls whether Buttondown creates a draft or
      # sends immediately based on Vercel env.
      - name: Send Buttondown email (gated)
        if: steps.mode.outputs.resolved == 'send'
        env:
          NUMEROLOGY_EMAIL_LIVE: "true"
          NUMEROLOGY_EMAIL_WEBHOOK_URL: ${{ secrets.NUMEROLOGY_EMAIL_WEBHOOK_URL || vars.NUMEROLOGY_EMAIL_WEBHOOK_URL }}
          NUMEROLOGY_EMAIL_WEBHOOK_TOKEN: ${{ secrets.NUMEROLOGY_EMAIL_WEBHOOK_TOKEN }}
        shell: bash
        run: |
          if [ -z "${NUMEROLOGY_EMAIL_WEBHOOK_URL}" ]; then
            echo "::error::mode=send requested but NUMEROLOGY_EMAIL_WEBHOOK_URL is not configured as a secret or variable. No email was created."
            exit 1
          fi
          if [ -z "${NUMEROLOGY_EMAIL_WEBHOOK_TOKEN}" ]; then
            echo "::error::mode=send requested but NUMEROLOGY_EMAIL_WEBHOOK_TOKEN secret is not configured. No email was created."
            exit 1
          fi
          DATE_FLAG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_FLAG="--date ${{ inputs.date }}"
          fi
          npm run mlb:numerology:email:send -- $DATE_FLAG

      - name: Detect meaningful tracking data changes
        id: changes
        if: steps.mode.outputs.resolved != 'skip'
        shell: bash
        run: |
          FILES="public/data/mlb/numerology/daily-card.json public/data/mlb/numerology/archive public/data/mlb/numerology/performance.json public/data/mlb/numerology/performance-summary.json"
          if [ -z "$(git status --porcelain -- $FILES)" ]; then
            echo "No meaningful numerology tracking changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Meaningful numerology tracking changes detected."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Persists only the generated tracking/data files. email-preview.html
      # and email-preview.txt are intentionally never staged -- they are
      # regenerated on every run and are not meant to be version-controlled.
      - name: Commit and push tracking data
        if: steps.mode.outputs.resolved != 'skip' && steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            public/data/mlb/numerology/daily-card.json \
            public/data/mlb/numerology/performance.json \
            public/data/mlb/numerology/performance-summary.json
          if [ -d public/data/mlb/numerology/archive ]; then
            git add public/data/mlb/numerology/archive
          fi

          if git diff --cached --quiet; then
            echo "No staged numerology tracking changes."
            exit 0
          fi

          git commit -m "chore: numerology email tracking $(TZ=America/New_York date '+%Y-%m-%d %H:%M ET')"

          pushed=false
          for attempt in 1 2 3 4 5; do
            echo "Push attempt ${attempt}/5"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase failed on attempt ${attempt}; aborting before retry." >&2
              git rebase --abort || true
            elif git push origin HEAD:main; then
              pushed=true
              break
            fi
            sleep $((attempt * 10))
          done

          if [ "$pushed" != "true" ]; then
            echo "ERROR: All push attempts failed -- numerology tracking data was not committed." >&2
            exit 1
          fi

          echo "Numerology tracking data pushed successfully."

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "== MLB Numerology Email summary =="
          echo "event: ${{ github.event_name }}"
          echo "requested mode (input): ${{ inputs.mode || 'n/a' }}"
          echo "resolved mode: ${{ steps.mode.outputs.resolved }}"
          echo "reason: ${{ steps.mode.outputs.reason }}"
          echo "tracking data changed: ${{ steps.changes.outputs.changed || 'n/a' }}"
