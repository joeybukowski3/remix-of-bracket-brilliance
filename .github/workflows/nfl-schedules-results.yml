name: NFL Schedules and Results

run-name: NFL Schedules and Results • ${{ github.event_name }} • ${{ github.ref_name }}

on:
  schedule:
    # 6:10 AM ET daily during the NFL season window (Sep-Feb) — after the
    # previous night's games (SNF/MNF/playoffs) are final in nflverse.
    - cron: "10 6 * 1,2,9,10,11,12 *"
      timezone: "America/New_York"
  workflow_dispatch:

# Share one lock with the other automated workflows that commit generated data to main.
concurrency:
  group: main-data-writers-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh-schedules-results:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate NFL schedules and results
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "NFL schedules attempt ${attempt}/3"
            if npm run nfl:schedules; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "NFL schedules generation failed after 3 attempts." >&2
          exit 1

      - name: Detect meaningful data changes
        id: changes
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- 'public/data/nfl/*/games.json' 'public/data/nfl/*/results.json')" ]; then
            echo "No NFL schedule/result changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "NFL schedule/result changes detected."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate generated JSON
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          node -e "
            const { readFileSync } = require('fs');
            for (let season = 2022; season <= 2026; season += 1) {
              for (const name of ['games.json', 'results.json']) {
                const file = \`public/data/nfl/\${season}/\${name}\`;
                const parsed = JSON.parse(readFileSync(file, 'utf8'));
                if (!parsed._meta || parsed._meta.schemaVersion !== 'nfl-v0.1') {
                  throw new Error(\`\${file} is missing a valid _meta block\`);
                }
              }
            }
            console.log('All generated NFL JSON files are valid.');
          "

      - name: Commit and push refreshed data
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/nfl/*/games.json public/data/nfl/*/results.json

          if git diff --cached --quiet; then
            echo "No staged NFL data changes."
            exit 0
          fi

          git commit -m "data(nfl): refresh schedules and results"

          pushed=false
          for attempt in 1 2 3 4 5; do
            echo "Push attempt ${attempt}/5"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase failed on attempt ${attempt}; aborting before retry." >&2
              git rebase --abort || true
            elif git push origin HEAD:main; then
              pushed=true
              break
            fi
            sleep $((attempt * 10))
          done

          if [ "$pushed" != "true" ]; then
            echo "ERROR: All push attempts failed — NFL data was not committed." >&2
            exit 1
          fi

          echo "NFL schedules and results pushed successfully."
