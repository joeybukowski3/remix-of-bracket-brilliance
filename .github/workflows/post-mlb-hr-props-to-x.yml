name: Post MLB HR Props to X

on:
  # Primary: fires after the 9:23 AM Generate MLB Data schedule run
  workflow_run:
    workflows: ["Generate MLB Data"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - post
          - post-text-only
          - verify-account
      data_source:
        description: "HR props data source"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - github
          - local

concurrency:
  group: post-mlb-hr-props-to-x
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post-hr-props-to-x:
    runs-on: ubuntu-latest
    # Only proceed when:
    # - Triggered manually (workflow_dispatch), OR
    # - Generate MLB Data completed successfully AND was triggered by its 9:23 AM schedule
    #   (not a push/manual run, to avoid posting after every code commit)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'schedule' &&
        github.event.workflow_run.head_branch == 'main'
      )
    env:
      X_EXPECTED_USERNAME: _joeknowsball_
      X_DUPLICATE_STATE_DIR: .cache/mlb-hr-props-x-posted
      JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
      JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
      JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
      JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Gate: only post once per day (9 AM ET window)
        id: time_gate
        shell: bash
        run: |
          # For workflow_run triggers: only post during the 9 AM - 11 AM ET window
          # This prevents afternoon schedule runs from re-posting
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ET_HOUR="$(TZ=America/New_York date +%H)"
          if [ "$ET_HOUR" -ge 9 ] && [ "$ET_HOUR" -lt 11 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Time gate passed: ${ET_HOUR}:xx ET is in the 9-11 AM posting window"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Time gate blocked: ${ET_HOUR}:xx ET is outside 9-11 AM posting window"
          fi

      - name: Determine duplicate key
        id: post_key
        if: steps.time_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && (inputs.mode == 'post' || inputs.mode == 'post-text-only')
        shell: bash
        run: |
          POST_KEY="$(HR_PROPS_DATA_SOURCE=production node scripts/post-mlb-hr-props-to-x.mjs --post-key-only)"
          if [ "${{ inputs.mode }}" = "post-text-only" ]; then
            POST_KEY="${POST_KEY}-text-only"
          fi
          echo "key=${POST_KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore duplicate cache
        id: restore_post_cache
        if: steps.time_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && (inputs.mode == 'post' || inputs.mode == 'post-text-only')
        uses: actions/cache/restore@v4
        with:
          path: .cache/mlb-hr-props-x-posted
          key: ${{ steps.post_key.outputs.key }}

      - name: Block duplicate live post
        if: steps.restore_post_cache.outputs.cache-hit == 'true'
        run: |
          echo "Duplicate protection blocked live posting."
          exit 1

      - name: Build HR props X caption and post
        if: steps.time_gate.outputs.should_run == 'true' && steps.restore_post_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            MODE="post"
          else
            MODE="${{ inputs.mode || 'dry-run' }}"
          fi
          echo "Running in mode: $MODE"
          node scripts/post-mlb-hr-props-to-x.mjs "--${MODE}"
        env:
          HR_PROPS_DATA_SOURCE: production
          X_ALLOW_LIVE_POST: "true"
          JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
          JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
          JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
          JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}

      - name: Upload screenshot (dry-run)
        if: steps.time_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: mlb-hr-props-x-screenshot
          path: artifacts/mlb-hr-props-x.png
          if-no-files-found: error

      - name: Save duplicate cache
        if: steps.time_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && (inputs.mode == 'post' || inputs.mode == 'post-text-only') && steps.restore_post_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/mlb-hr-props-x-posted
          key: ${{ steps.post_key.outputs.key }}

      - name: Upload post receipt
        if: steps.time_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && (inputs.mode == 'post' || inputs.mode == 'post-text-only') && steps.restore_post_cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mlb-hr-props-x-post-receipt
          path: .cache/mlb-hr-props-x-posted/*.json
          if-no-files-found: warn
