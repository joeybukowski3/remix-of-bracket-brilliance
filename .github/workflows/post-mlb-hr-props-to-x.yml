name: Post MLB HR Props to X

# Posting cadence is driven by the day's EARLIEST scheduled first pitch, not a
# fixed clock time. This workflow polls on a broad, DST-safe UTC window every
# 15 minutes; the runtime readiness gate
# (scripts/check-mlb-x-posting-readiness.mjs) is the single source of truth for
# timing and confirmation:
#   1. It fetches the live MLB schedule (earliest first pitch, current
#      starters, game status) + boxscores (official batting orders) and decides
#      one of: post now, keep waiting, or skip cleanly -- printing finalStatus=.
#   2. It only reports READY inside the posting window (~3h before first pitch,
#      preferring 60-90 min out, hard cutoff ~40 min out) AND when enough
#      hitters are confirmed in today's official batting order (projected-lineup
#      hitters are never eligible for a live post; the website still shows them).
#   3. Outside the window / on stale data / when confirmation can't be verified
#      it fails closed (no post). The daily posting lock (one key per slate
#      date) still guarantees at most one live post per day.
# The gate runs WITHOUT `npm ci`/Playwright (it uses only Node built-ins), so
# the ~60 daily poll attempts are cheap; the heavy post path (deps + Playwright
# + screenshot + X API) runs only when the gate reports READY.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "post"
        type: choice
        options: [dry-run, post, post-text-only, verify-account]
      data_source:
        description: "Data source (only applies to workflow_dispatch; automated runs always use production)"
        required: true
        default: "production"
        type: choice
        options: [production, github, local]
      force_repost:
        description: "Bypass the daily posting lock and post again even if today's slate already has a receipt. Only for an intentional, reviewed re-post -- never set true routinely."
        required: true
        default: false
        type: boolean
  workflow_run:
    workflows: ["Generate MLB Data"]
    types: [completed]
    branches: [main]
  schedule:
    # 15-minute polling across a broad, DST-safe UTC window. GitHub Actions
    # cron is UTC-only and has no seasonal/timezone concept, so this window is
    # written wide enough to cover the real MLB range in BOTH EST and EDT:
    # 12:00-03:00 UTC spans ~7-8 AM ET (earliest a ~3h-before-first-pitch poll
    # can matter for an ~11 AM ET day game) through ~9-10 PM ET (latest a poll
    # can matter for a West-Coast-only ~10 PM ET first pitch). It is NOT a
    # 24-hour schedule. The runtime readiness gate -- not this cron -- decides
    # whether any given firing actually posts; every firing outside the real
    # per-day window exits cheaply as WAITING_FOR_POLLING_WINDOW / EXPIRED /
    # SKIPPED_NO_GAMES.
    - cron: "*/15 12-23 * * *"
    - cron: "*/15 0-2 * * *"

concurrency:
  group: post-mlb-hr-props-to-x
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post-hr-props-to-x:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'schedule' &&
        github.event.workflow_run.head_branch == 'main'
      )
    env:
      X_EXPECTED_USERNAME: _joeknowsball_
      X_DUPLICATE_STATE_DIR: .cache/mlb-hr-props-x-posted
      JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
      JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
      JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
      JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - name: Compute ET date for cache key
        id: et_date
        shell: bash
        run: echo "date=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # Restore the day-scoped duplicate-post receipt so a poll after a
      # successful post short-circuits without doing any heavy work. Run-unique
      # save keys + restore-keys let the cache accumulate across the day's many
      # polls (a single fixed key can only be saved once per day).
      - name: Restore duplicate-post state
        id: restore_cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/mlb-hr-props-x-posted
          key: mlb-hr-props-x-posted-${{ steps.et_date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            mlb-hr-props-x-posted-${{ steps.et_date.outputs.date }}-

      - name: Already posted today?
        id: already
        shell: bash
        run: |
          KEY="mlb-hr-props:${{ steps.et_date.outputs.date }}"
          SLUG="$(echo "$KEY" | sed 's/[^a-zA-Z0-9._-]\+/-/g')"
          if [ -f ".cache/mlb-hr-props-x-posted/${SLUG}.json" ] && [ "${{ inputs.force_repost || 'false' }}" != "true" ]; then
            echo "posted=true" >> "$GITHUB_OUTPUT"
            echo "Today's slate already has a post receipt -- skipping (finalStatus=SKIPPED_ALREADY_POSTED_TODAY)."
          else
            echo "posted=false" >> "$GITHUB_OUTPUT"
          fi

      # Lightweight readiness gate: NO npm ci / Playwright. Manual
      # workflow_dispatch bypasses it (the operator chose the mode explicitly);
      # automated schedule/workflow_run firings must earn a READY here.
      - name: Readiness gate
        id: gate
        if: steps.already.outputs.posted != 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Readiness gate bypassed: manual workflow_dispatch (mode=${{ inputs.mode || 'post' }})."
            exit 0
          fi
          set +e
          node scripts/check-mlb-x-posting-readiness.mjs --content=hr --data-source=production
          CODE=$?
          set -e
          if [ "$CODE" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Readiness gate: READY -- proceeding to post."
          elif [ "$CODE" -eq 20 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Readiness gate: clean wait/skip -- no post this attempt."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Readiness gate: confirmation source failed -- failing closed." >&2
            exit 1
          fi

      - name: Install dependencies
        if: steps.gate.outputs.ready == 'true'
        run: npm ci

      - name: Install Playwright
        if: steps.gate.outputs.ready == 'true'
        run: npx playwright install --with-deps chromium

      - name: Post HR Props
        id: post
        if: steps.gate.outputs.ready == 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            MODE="post"
            DATA_SOURCE="production"
          else
            MODE="${{ inputs.mode || 'post' }}"
            DATA_SOURCE="${{ inputs.data_source || 'production' }}"
          fi
          echo "Mode: $MODE"
          echo "Data source: $DATA_SOURCE"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          HR_PROPS_DATA_SOURCE="$DATA_SOURCE" node scripts/post-mlb-hr-props-to-x.mjs "--${MODE}"
        env:
          X_ALLOW_LIVE_POST: "true"
          HR_X_FORCE_REPOST: ${{ inputs.force_repost || 'false' }}
          JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
          JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
          JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
          JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}

      # always() so a receipt written just before a later failure still
      # persists; only when we actually reached the post path (gate READY).
      - name: Save duplicate-post state
        if: always() && steps.gate.outputs.ready == 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/mlb-hr-props-x-posted
          key: mlb-hr-props-x-posted-${{ steps.et_date.outputs.date }}-${{ github.run_id }}

      - name: Upload screenshot (dry-run)
        if: steps.gate.outputs.ready == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: mlb-hr-props-x-screenshot
          path: artifacts/mlb-hr-props-x.png
          if-no-files-found: error

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "== Post MLB HR Props to X summary =="
          echo "trigger event: ${{ github.event_name }}"
          echo "already posted today: ${{ steps.already.outputs.posted || 'n/a' }}"
          echo "readiness gate ready: ${{ steps.gate.outputs.ready || 'n/a (skipped: already posted)' }}"
          echo "resolved mode: ${{ steps.post.outputs.mode || 'n/a (gate not ready)' }}"
          echo "force repost override: ${{ inputs.force_repost || 'false' }}"
          echo "See the 'Readiness gate' step for the finalStatus= line (READY_CONFIRMED_SELECTIONS / WAITING_FOR_* / SKIPPED_* / FAILED_CONFIRMATION_SOURCE) and the 'Post HR Props' step for the script's own finalStatus= (POSTED / SKIPPED_ALREADY_POSTED_TODAY / SKIPPED_NO_ELIGIBLE_ROWS / FAILED)."
