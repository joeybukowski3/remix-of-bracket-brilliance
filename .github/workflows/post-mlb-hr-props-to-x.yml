name: Post MLB HR Props to X

on:
  schedule:
    # Runs after the 1 PM ET HR props refresh normally completes.
    - cron: "30 17 * * *" # 1:30 PM EDT
    - cron: "30 18 * * *" # 1:30 PM EST
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - post
          - verify-account
      data_source:
        description: "HR props data source"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - github
          - local

concurrency:
  group: post-mlb-hr-props-to-x
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post-hr-props-to-x:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Gate scheduled run to the correct timezone slot
        id: schedule_gate
        shell: bash
        run: |
          SHOULD_RUN="true"
          MESSAGE=""

          if [ "${{ github.event_name }}" = "schedule" ]; then
            ET_ZONE="$(TZ=America/New_York date +%Z)"

            # 1:30 PM ET after the 1 PM HR props refresh.
            if [ "$ET_ZONE" = "EDT" ]; then
              VALID_CRONS="30 17 * * *"
            else
              VALID_CRONS="30 18 * * *"
            fi

            CURRENT="${{ github.event.schedule }}"
            if echo "$VALID_CRONS" | grep -qF "$CURRENT"; then
              SHOULD_RUN="true"
            else
              SHOULD_RUN="false"
              MESSAGE="Skipping duplicate cron for $ET_ZONE: $CURRENT is not the valid posting slot."
            fi
          fi

          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"
          echo "message=${MESSAGE}" >> "$GITHUB_OUTPUT"

      - name: Report skipped duplicate cron
        if: steps.schedule_gate.outputs.should_run != 'true'
        run: echo "${{ steps.schedule_gate.outputs.message }}"

      - name: Determine live post duplicate key
        id: post_key
        if: steps.schedule_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'post'
        shell: bash
        run: |
          POST_KEY="$(HR_PROPS_DATA_SOURCE=production node scripts/post-mlb-hr-props-to-x.mjs --post-key-only)"
          echo "key=${POST_KEY}" >> "$GITHUB_OUTPUT"
          echo "Live post duplicate key: ${POST_KEY}"

      - name: Restore live post duplicate cache
        id: restore_post_cache
        if: steps.schedule_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'post'
        uses: actions/cache/restore@v4
        with:
          path: .cache/mlb-hr-props-x-posted
          key: ${{ steps.post_key.outputs.key }}

      - name: Block duplicate live post
        if: steps.restore_post_cache.outputs.cache-hit == 'true'
        run: |
          echo "Duplicate protection blocked live posting for ${{ steps.post_key.outputs.key }}."
          exit 1

      - name: Build HR props X caption
        if: steps.schedule_gate.outputs.should_run == 'true' && steps.restore_post_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          MODE="${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'dry-run' }}"
          DATA_SOURCE="${{ github.event_name == 'workflow_dispatch' && inputs.data_source || 'production' }}"
          if [ "$MODE" = "post" ]; then
            DATA_SOURCE="production"
          fi
          HR_PROPS_DATA_SOURCE="$DATA_SOURCE" node scripts/post-mlb-hr-props-to-x.mjs "--${MODE}"
        env:
          X_EXPECTED_USERNAME: _joeknowsball_
          X_ALLOW_LIVE_POST: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'post' && 'true' || 'false' }}
          X_DUPLICATE_STATE_DIR: .cache/mlb-hr-props-x-posted
          JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
          JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
          JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
          JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}

      - name: Upload HR props X screenshot
        if: steps.schedule_gate.outputs.should_run == 'true' && (github.event_name != 'workflow_dispatch' || inputs.mode == 'dry-run')
        uses: actions/upload-artifact@v4
        with:
          name: mlb-hr-props-x-screenshot
          path: artifacts/mlb-hr-props-x.png
          if-no-files-found: error

      - name: Save live post duplicate cache
        if: steps.schedule_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'post' && steps.restore_post_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/mlb-hr-props-x-posted
          key: ${{ steps.post_key.outputs.key }}

      - name: Upload live post receipt
        if: steps.schedule_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'post' && steps.restore_post_cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mlb-hr-props-x-post-receipt
          path: .cache/mlb-hr-props-x-posted/*.json
          if-no-files-found: error
