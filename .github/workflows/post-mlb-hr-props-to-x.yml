name: Post MLB HR Props to X

# Why this workflow may not post on a given day, and how to read the logs:
#   1. workflow_run (primary trigger) only fires after "Generate MLB Data"
#      completes, and only proceeds past the job-level `if` when that
#      completion was itself a `schedule` run on `main` that succeeded.
#   2. The time gate below then requires the run to land inside the
#      9 AM-2 PM ET window (see "Time gate" step for why this window is
#      wide, not the original 9-11 AM).
#   3. "Wait for fresh production slate" then retries for up to ~9 minutes
#      for the live site's HR props data to actually be post-ready
#      (correct slate date, enough valid props, real odds) before giving
#      up and failing the run rather than posting stale/incomplete data.
#   4. The script itself (post-mlb-hr-props-to-x.mjs) can still skip
#      silently-but-loudly (logs a reason, exits 0) if the freshness/odds/
#      top-props checks fail even after that wait, or if the daily
#      posting lock (one key per slate date -- see buildDailyPostingKey
#      in the script) finds today already has a post receipt.
# The "Summary" step at the end of every run logs which of these applied,
# and the script itself logs a final `finalStatus=` line: POSTED,
# SKIPPED_ALREADY_POSTED_TODAY, SKIPPED_PREVIEW_MODE,
# SKIPPED_NO_ELIGIBLE_ROWS, or FAILED.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "post"
        type: choice
        options: [dry-run, post, post-text-only, verify-account]
      data_source:
        description: "Data source (only applies to workflow_dispatch; automated runs always use production)"
        required: true
        default: "production"
        type: choice
        options: [production, github, local]
      force_repost:
        description: "Bypass the daily posting lock and post again even if today's slate already has a receipt. Only for an intentional, reviewed re-post -- never set true routinely."
        required: true
        default: false
        type: boolean
  workflow_run:
    workflows: ["Generate MLB Data"]
    types: [completed]
    branches: [main]
  schedule:
    # Backstop trigger, in case workflow_run never fires or fires too
    # late in the window to see fresh data. GitHub Actions `schedule`
    # cron is UTC-only -- a `timezone:` sub-key here was previously
    # assumed to shift this to America/New_York, but that is NOT
    # confirmed GitHub Actions behavior (see PR description). Written in
    # explicit UTC with a DST-safe pair of cron entries instead: one
    # fires for real during EDT, one during EST, and only the one that
    # matches the current wall-clock does anything useful -- the other's
    # firing is a harmless no-op caught by the time gate/daily lock.
    #   - "45 17 * * *" = 17:45 UTC = 1:45 PM ET during EDT (Mar-Nov)
    #   - "45 18 * * *" = 18:45 UTC = 1:45 PM ET during EST (Nov-Mar)
    # 1:45 PM ET sits inside the 9 AM-2 PM ET time gate below, late
    # enough to give workflow_run every chance to post first (today's
    # observed workflow_run completions ranged 5:03 AM-1:24 PM ET), while
    # the daily posting lock guarantees this never double-posts if
    # workflow_run already succeeded earlier.
    - cron: "45 17 * * *"
    - cron: "45 18 * * *"

concurrency:
  group: post-mlb-hr-props-to-x
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post-hr-props-to-x:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'schedule' &&
        github.event.workflow_run.head_branch == 'main'
      )
    env:
      X_EXPECTED_USERNAME: _joeknowsball_
      X_DUPLICATE_STATE_DIR: .cache/mlb-hr-props-x-posted
      JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
      JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
      JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
      JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Compute ET date for cache key
        id: et_date
        shell: bash
        run: echo "date=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # actions/cache write-once bug fix: a single fixed key
      # (mlb-hr-props-x-posted-<date>) can only ever be *saved* once per
      # day -- GitHub Actions cache keys are immutable, so every run after
      # the first one that day silently fails to persist its updated
      # receipt back to the cache (logged as a warning, not an error).
      # Confirmed via Actions run history 2026-07-10: two separate runs
      # (16:36 and 17:24 UTC) computed the identical daily posting key and
      # BOTH posted, because the second run's restore only ever saw the
      # cache state from the *first* successful save of the day. Fixed by
      # giving every run's save a unique key (run_id) and using
      # restore-keys to pick up the most recent prior save by prefix --
      # this lets the cache accumulate across multiple runs in one day
      # instead of freezing after the first.
      - name: Restore duplicate-post state
        id: restore_cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/mlb-hr-props-x-posted
          key: mlb-hr-props-x-posted-${{ steps.et_date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            mlb-hr-props-x-posted-${{ steps.et_date.outputs.date }}-

      # Widened from the original 9-11 AM ET window: Actions run history for
      # this repo shows "Generate MLB Data"'s scheduled completions routinely
      # land 1.5-3+ hours after their nominal cron time (the 10:23 AM ET slot
      # has been observed completing anywhere from 11:20 AM to 1:35 PM ET),
      # so a 2-hour window was missing most real completions entirely. 9 AM
      # to 2 PM ET covers every completion time observed in that history.
      # Applies uniformly to workflow_run and the direct backstop schedule;
      # workflow_dispatch always bypasses it.
      - name: Time gate (9 AM-2 PM ET for automated triggers only)
        id: time_gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Time gate bypassed: manual workflow_dispatch."
            exit 0
          fi
          ET_HOUR="$(TZ=America/New_York date +%H)"
          if [ "$ET_HOUR" -ge 9 ] && [ "$ET_HOUR" -lt 14 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Time gate passed: ${ET_HOUR}:xx ET is within the 9 AM-2 PM window (trigger: ${{ github.event_name }})."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Time gate blocked: ${ET_HOUR}:xx ET is outside the 9 AM-2 PM window (trigger: ${{ github.event_name }}). No post will be attempted this run."
          fi

      # Increased from 8 attempts x 45s (~6 min) to 12 x 45s (~9 min): the
      # one automated run that has reached this step (2026-07-04, 10:06 AM
      # ET) exhausted the old 6-minute budget and failed, which is itself
      # evidence the old window was too tight for Vercel's production
      # deploy to reliably catch up after "Generate MLB Data" pushes.
      - name: Wait for fresh production slate
        if: steps.time_gate.outputs.should_run == 'true' && (github.event_name == 'workflow_run' || github.event_name == 'schedule')
        shell: bash
        env:
          HR_PROPS_DATA_SOURCE: production
        run: |
          set -euo pipefail
          ready=false
          for attempt in $(seq 1 12); do
            echo "Production readiness check ${attempt}/12"
            if node scripts/post-mlb-hr-props-to-x.mjs --post-key-only; then
              ready=true
              break
            fi
            if [ "$attempt" -lt 12 ]; then sleep 45; fi
          done
          if [ "$ready" != "true" ]; then
            echo "ERROR: Production HR props did not become post-ready within ~9 minutes after the data workflow. See the readiness check output above for the specific reason (stale date, too few valid props, missing odds, etc.)." >&2
            exit 1
          fi

      - name: Post HR Props
        id: post
        if: steps.time_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            MODE="post"
            DATA_SOURCE="production"
          else
            MODE="${{ inputs.mode || 'post' }}"
            DATA_SOURCE="${{ inputs.data_source || 'production' }}"
          fi
          echo "Mode: $MODE"
          echo "Data source: $DATA_SOURCE"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          HR_PROPS_DATA_SOURCE="$DATA_SOURCE" node scripts/post-mlb-hr-props-to-x.mjs "--${MODE}"
        env:
          X_ALLOW_LIVE_POST: "true"
          # Only ever meaningful for workflow_dispatch (inputs.* is empty
          # for workflow_run/schedule); the script also independently
          # re-checks GITHUB_EVENT_NAME before honoring this.
          HR_X_FORCE_REPOST: ${{ inputs.force_repost || 'false' }}
          JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
          JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
          JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
          JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}

      # Explicit save under a run-unique key -- see the "Restore
      # duplicate-post state" step above for why a single fixed key
      # cannot be used. always() so a receipt written just before a later
      # failure (e.g. the screenshot-upload step) still persists.
      - name: Save duplicate-post state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/mlb-hr-props-x-posted
          key: mlb-hr-props-x-posted-${{ steps.et_date.outputs.date }}-${{ github.run_id }}

      - name: Upload screenshot (dry-run)
        if: steps.time_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: mlb-hr-props-x-screenshot
          path: artifacts/mlb-hr-props-x.png
          if-no-files-found: error

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "== Post MLB HR Props to X summary =="
          echo "trigger event: ${{ github.event_name }}"
          echo "workflow_run conclusion (if applicable): ${{ github.event.workflow_run.conclusion || 'n/a' }}"
          echo "workflow_run event (if applicable): ${{ github.event.workflow_run.event || 'n/a' }}"
          echo "time gate should_run: ${{ steps.time_gate.outputs.should_run || 'n/a' }}"
          echo "resolved mode: ${{ steps.post.outputs.mode || 'n/a (time gate blocked before mode was resolved)' }}"
          echo "force repost override: ${{ inputs.force_repost || 'false' }}"
          echo "See the 'Post HR Props' step output above for the exact finalStatus= line (POSTED / SKIPPED_ALREADY_POSTED_TODAY / SKIPPED_PREVIEW_MODE / SKIPPED_NO_ELIGIBLE_ROWS / FAILED) and skip/post/error reason from the script itself."
