name: Post MLB ML Edges to X

# PAUSED: live ML posting is disabled while the ML model/table content is
# under revision (see ML_X_POSTING_ENABLED below, checked centrally in
# scripts/post-mlb-ml-edges-to-x.mjs's isMlPostingEnabled -- every live
# path, scheduled/workflow_run and manual workflow_dispatch mode=post/
# post-text-only alike, passes through that one gate before any X API
# call is made). Generation/preview (--dry-run) and account verification
# remain available. The "Summary" step below always states the paused
# status explicitly so a green run is never mistaken for "nothing to
# post today" -- re-enable by setting ML_X_POSTING_ENABLED to "true" once
# the model is ready.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "post"
        type: choice
        options: [dry-run, post, post-text-only, verify-account]
  workflow_run:
    workflows: ["Generate MLB Data"]
    types: [completed]
    branches: [main]

concurrency:
  group: post-mlb-ml-edges-to-x
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post-ml-edges-to-x:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'schedule' &&
        github.event.workflow_run.head_branch == 'main'
      )
    env:
      X_EXPECTED_USERNAME: _joeknowsball_
      X_DUPLICATE_STATE_DIR: .cache/mlb-ml-edges-x-posted
      JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
      JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
      JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
      JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Compute ET date for cache key
        id: et_date
        shell: bash
        run: echo "date=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore duplicate-post state
        uses: actions/cache@v4
        with:
          path: .cache/mlb-ml-edges-x-posted
          key: mlb-ml-edges-x-posted-${{ steps.et_date.outputs.date }}

      - name: Time gate (9-11 AM ET for workflow_run only)
        id: time_gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          ET_HOUR="$(TZ=America/New_York date +%H)"
          if [ "$ET_HOUR" -ge 9 ] && [ "$ET_HOUR" -lt 11 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Time gate passed: ${ET_HOUR}:xx ET"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Time gate blocked: ${ET_HOUR}:xx ET outside 9-11 AM window"
          fi

      - name: Wait for fresh production slate
        if: steps.time_gate.outputs.should_run == 'true' && github.event_name == 'workflow_run'
        shell: bash
        run: |
          set -euo pipefail
          ready=false
          for attempt in 1 2 3 4 5 6 7 8; do
            echo "Production readiness check ${attempt}/8"
            if node scripts/post-mlb-ml-edges-to-x.mjs --post-key-only; then
              ready=true
              break
            fi
            if [ "$attempt" -lt 8 ]; then sleep 45; fi
          done
          if [ "$ready" != "true" ]; then
            echo "ERROR: Production ML edges did not become post-ready after the data workflow." >&2
            exit 1
          fi

      - name: Post ML Edges
        if: steps.time_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            MODE="post"
          else
            MODE="${{ inputs.mode || 'post' }}"
          fi
          echo "Mode: $MODE"
          node scripts/post-mlb-ml-edges-to-x.mjs "--${MODE}"
        env:
          X_ALLOW_LIVE_POST: "true"
          # Central pause switch -- see the top-of-file comment. Explicitly
          # "false" here (rather than just omitted) so the pause is visible
          # directly in this workflow file, not just inferred from absence.
          ML_X_POSTING_ENABLED: "false"
          JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
          JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
          JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
          JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}

      - name: Upload screenshot (dry-run)
        if: steps.time_gate.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: mlb-ml-edges-x-screenshot
          path: artifacts/mlb-ml-edges-x.png
          if-no-files-found: error

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "== Post MLB ML Edges to X summary =="
          echo "trigger event: ${{ github.event_name }}"
          echo "time gate should_run: ${{ steps.time_gate.outputs.should_run || 'n/a' }}"
          echo "*** ML LIVE X POSTING IS PAUSED BY CONFIGURATION (ML_X_POSTING_ENABLED=false) *** -- the ML model/table is under revision. No X API call is made for mode=post/post-text-only regardless of trigger."
          echo "See the 'Post ML Edges' step output above for the finalStatus= line and skip/post/error reason from the script itself."
