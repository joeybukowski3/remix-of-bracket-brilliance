name: Post MLB Numerology to X

# Manual-dispatch only, for now. Unlike post-mlb-hr-props-to-x.yml, this
# workflow has no workflow_run/schedule trigger yet -- it will not post
# automatically until that's explicitly requested and added separately.
# mode=post/post-text-only additionally requires X_ALLOW_LIVE_POST=true
# (set below, not configurable via input) and passing account verification,
# so a live post can only happen via an explicit, reviewed workflow_dispatch.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "dry-run"
        type: choice
        options: [dry-run, post, post-text-only, verify-account]
      data_source:
        description: "Data source"
        required: true
        default: "production"
        type: choice
        options: [production, github, local]
      screenshot_url:
        description: "Override the URL screenshotted (leave blank to use the live production export page)"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - ".github/workflows/post-mlb-numerology-to-x.yml"
      - "scripts/post-mlb-numerology-to-x.mjs"
      - "scripts/generate-mlb-numerology-x-preview.mjs"
      - "scripts/lib/mlb-numerology-x-post-core.mjs"
      - "src/pages/MlbNumerologyXExport.tsx"
      - "src/hooks/useMlbNumerologyXPreview.ts"

concurrency:
  group: post-mlb-numerology-to-x
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post-numerology-to-x:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      X_EXPECTED_USERNAME: _joeknowsball_
      X_DUPLICATE_STATE_DIR: .cache/mlb-numerology-x-posted
      JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
      JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
      JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
      JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      # push-trigger CI validation only exercises the generator + tests, not
      # the Playwright/screenshot/posting path (no live site to screenshot
      # from a plain push, and mode=dry-run would need a resolvable target).
      - name: Run numerology X-post unit tests
        run: npx vitest run src/lib/mlb/mlbNumerologyXPostCore.test.ts

      - name: Generate numerology X preview (local, for local/dry-run testing and as CI validation)
        if: github.event_name == 'push' || inputs.data_source == 'local'
        run: node scripts/generate-mlb-numerology-x-preview.mjs

      - name: Stop here for push-triggered CI validation
        if: github.event_name == 'push'
        run: echo "CI validation of generator + unit tests passed. Screenshot/post steps only run on workflow_dispatch."

      - run: npx playwright install --with-deps chromium
        if: github.event_name == 'workflow_dispatch'

      - name: Run mode
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          NUMEROLOGY_X_DATA_SOURCE: ${{ inputs.data_source }}
          NUMEROLOGY_X_SCREENSHOT_URL: ${{ inputs.screenshot_url }}
          X_ALLOW_LIVE_POST: "true"
        run: |
          echo "Mode: ${{ inputs.mode }}"
          echo "Data source: ${{ inputs.data_source }}"
          node scripts/post-mlb-numerology-to-x.mjs "--${{ inputs.mode }}"

      - name: Upload preview screenshot
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: mlb-numerology-x-screenshot
          path: artifacts/mlb-numerology-x.png
          if-no-files-found: warn

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "== Post MLB Numerology to X summary =="
          echo "event: ${{ github.event_name }}"
          echo "requested mode: ${{ inputs.mode || 'n/a (push validation only)' }}"
          echo "data source: ${{ inputs.data_source || 'n/a' }}"
          echo "See the 'Run mode' step output above for the caption/skip/error reason from the script itself."
