name: Post MLB Numerology to X

# Manual/rescue-only X posting workflow. Automatic delivery moved to
# poll-mlb-numerology-delivery.yml, which shares ONE frozen, confirmed-
# lineup selection artifact between this poster and the email delivery job
# (see that workflow's own header comment for the full rationale: first-
# pitch-relative 120/75/30-minute timing instead of this file's old fixed
# DST-gated schedule, and confirmed-lineup-only eligibility instead of the
# score-threshold-only policy this file used to run automatically). This
# file still owns manual dry-run/verify-account/force-repost operator
# access, plus a tightly marker-gated push recovery path so an authorized
# repair commit can recover a missed daily post without making normal code
# pushes post to X.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "post"
        type: choice
        options: [dry-run, post, post-text-only, verify-account]
      data_source:
        description: "Data source"
        required: true
        default: "production"
        type: choice
        options: [production, github, local]
      screenshot_url:
        description: "Override the URL screenshotted"
        required: false
        type: string
      force_repost:
        description: "Bypass the daily posting lock and post again even if today's slate already has a receipt."
        required: true
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - ".github/workflows/post-mlb-numerology-to-x.yml"

concurrency:
  group: post-mlb-numerology-to-x
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post-numerology-to-x:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[rescue-numerology-x-post]'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      X_EXPECTED_USERNAME: _joeknowsball_
      X_DUPLICATE_STATE_DIR: .cache/mlb-numerology-x-posted
      JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
      JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
      JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
      JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Run numerology X-post unit tests
        run: npx vitest run src/lib/mlb/mlbNumerologyXPostCore.test.ts

      # Always resolves should_run=true now that this file has no schedule:
      # trigger (see the header comment) -- kept rather than removed so a
      # schedule trigger could be safely re-added here in the future without
      # also having to re-thread should_run through every step below.
      - name: DST match gate (schedule trigger only)
        id: dst_gate
        shell: bash
        env:
          DST_GATE_TARGET_ET_HOUR: "11"
          DST_GATE_TARGET_ET_MINUTE: "0"
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if node scripts/check-dst-gate.mjs; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute ET date for cache key
        id: et_date
        if: steps.dst_gate.outputs.should_run == 'true'
        shell: bash
        run: echo "date=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore duplicate-post state
        if: steps.dst_gate.outputs.should_run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .cache/mlb-numerology-x-posted
          key: mlb-numerology-x-posted-${{ steps.et_date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            mlb-numerology-x-posted-${{ steps.et_date.outputs.date }}-

      - name: Install Playwright
        if: steps.dst_gate.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Resolve mode
        id: resolve_mode
        if: steps.dst_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode || 'post' }}"
          else
            MODE="post"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Resolved mode=$MODE for event=${{ github.event_name }}"

      # post/post-text-only ONLY -- dry-run and verify-account are
      # unaffected and keep screenshotting/checking against whatever
      # data_source the operator picked, no artifact required. A live post
      # always requires a fresh, forced confirmed-lineup artifact; see
      # assertLivePostConfirmed in mlb-numerology-x-post-core.mjs, which
      # post-mlb-numerology-to-x.mjs checks and refuses to post without.
      # --force builds one at any time of day by bypassing the first-pitch-
      # relative phase gate -- it can NEVER bypass live lineup confirmation
      # itself (plan-mlb-numerology-delivery.mjs's own header comment), and
      # it is a wholly separate mechanism from force_repost below, which
      # only ever overrides the daily *duplicate-post* lock, never this.
      - name: Build confirmed selection artifact
        id: build_artifact
        if: >-
          steps.dst_gate.outputs.should_run == 'true' &&
          (steps.resolve_mode.outputs.mode == 'post' || steps.resolve_mode.outputs.mode == 'post-text-only')
        run: node scripts/plan-mlb-numerology-delivery.mjs --force --plan-path=artifacts/mlb-numerology-poll-plan.json --artifact-path=artifacts/mlb-numerology-selection-artifact.json

      - name: Fail closed if no players are currently confirmed
        if: steps.build_artifact.outcome == 'success' && steps.build_artifact.outputs.ready != 'true'
        run: |
          echo "::error::No live-confirmed qualifying numerology players are available right now. Refusing to post -- try again closer to first pitch, once official lineups are posted."
          exit 1

      - name: Generate X preview from the confirmed artifact
        if: steps.build_artifact.outputs.ready == 'true'
        env:
          NUMEROLOGY_SELECTION_ARTIFACT_PATH: artifacts/mlb-numerology-selection-artifact.json
        run: node scripts/generate-mlb-numerology-x-preview.mjs

      # Bundles the just-written local x-post-preview.json (confirmationStatus
      # "confirmed") into dist/, so the local preview server below serves
      # the exact confirmed selection -- never a stale or not-yet-deployed
      # production copy.
      - name: Build site for local export render
        if: steps.build_artifact.outputs.ready == 'true'
        run: npm run build

      - name: Run mode
        if: steps.dst_gate.outputs.should_run == 'true'
        shell: bash
        env:
          NUMEROLOGY_X_DATA_SOURCE: ${{ steps.build_artifact.outputs.ready == 'true' && 'local' || (github.event_name == 'workflow_dispatch' && inputs.data_source || 'production') }}
          NUMEROLOGY_SELECTION_ARTIFACT_PATH: ${{ steps.build_artifact.outputs.ready == 'true' && 'artifacts/mlb-numerology-selection-artifact.json' || '' }}
          NUMEROLOGY_X_SCREENSHOT_URL: ${{ inputs.screenshot_url }}
          X_ALLOW_LIVE_POST: "true"
          NUMEROLOGY_X_SCHEDULED_LIVE_ENABLED: "true"
          NUMEROLOGY_X_FORCE_REPOST: ${{ github.event_name == 'workflow_dispatch' && inputs.force_repost || 'false' }}
        run: |
          echo "Mode: ${{ steps.resolve_mode.outputs.mode }}"
          echo "Data source: $NUMEROLOGY_X_DATA_SOURCE"
          if [ "${{ steps.build_artifact.outputs.ready }}" = "true" ]; then
            node scripts/run-numerology-x-post-locally.mjs "--${{ steps.resolve_mode.outputs.mode }}"
          else
            node scripts/post-mlb-numerology-to-x.mjs "--${{ steps.resolve_mode.outputs.mode }}"
          fi

      - name: Save duplicate-post state
        if: always() && steps.dst_gate.outputs.should_run == 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/mlb-numerology-x-posted
          key: mlb-numerology-x-posted-${{ steps.et_date.outputs.date }}-${{ github.run_id }}

      - name: Upload preview screenshot
        if: steps.dst_gate.outputs.should_run == 'true' && steps.resolve_mode.outputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: mlb-numerology-x-screenshot
          path: artifacts/mlb-numerology-x.png
          if-no-files-found: warn

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "== Post MLB Numerology to X summary =="
          echo "event: ${{ github.event_name }}"
          echo "DST gate should_run: ${{ steps.dst_gate.outputs.should_run || 'n/a' }}"
          echo "resolved mode: ${{ steps.resolve_mode.outputs.mode || 'n/a' }}"
          echo "See Run mode for finalStatus=."
