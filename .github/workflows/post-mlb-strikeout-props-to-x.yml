name: Post MLB Strikeout Props to X

# Posting cadence is driven by the day's EARLIEST scheduled first pitch, not a
# fixed clock time. This workflow polls on a broad, DST-safe UTC window every
# 15 minutes; the runtime timing gate (scripts/check-mlb-x-posting-readiness.mjs
# --content=k) is the single source of truth for the window:
#   - It fetches the live MLB schedule and reports READY only inside the posting
#     window (~3h before first pitch, hard cutoff ~40 min out), and WAITING /
#     SKIPPED / FAILED otherwise (fail closed on schedule errors).
#   - It replaces the old fixed 1:50 PM ET DST-paired backstop + 9 AM-2 PM ET
#     time gate: the window now follows the actual first pitch.
# The gate runs WITHOUT `npm ci`/Playwright (Node built-ins only), so the daily
# poll attempts are cheap; the heavy path (deps + Playwright + freshness wait +
# X API) runs only when the gate reports READY.
#
# The K poster reads the live rendered K table and posts only VALID rows; the
# script logs a final `finalStatus=` line: POSTED, SKIPPED_ALREADY_POSTED_TODAY,
# SKIPPED_PREVIEW_MODE, SKIPPED_NO_ELIGIBLE_ROWS, or FAILED.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "post"
        type: choice
        options: [dry-run, post, post-text-only, verify-account]
      data_source:
        description: "Data source"
        required: true
        default: "production"
        type: choice
        options: [production, github, local]
      force_repost:
        description: "Bypass the daily posting lock and post again even if today's slate already has a receipt. Only for an intentional, reviewed re-post -- never set true routinely."
        required: true
        default: false
        type: boolean
  workflow_run:
    workflows: ["Generate MLB Data"]
    types: [completed]
    branches: [main]
  schedule:
    # 15-minute polling across a broad, DST-safe UTC window (12:00-03:00 UTC --
    # covers the real MLB range in both EST and EDT; NOT a 24h schedule). The
    # runtime timing gate, not this cron, decides whether any firing posts. See
    # post-mlb-hr-props-to-x.yml for the full rationale.
    - cron: "*/15 12-23 * * *"
    - cron: "*/15 0-2 * * *"

concurrency:
  group: post-mlb-strikeout-props-to-x
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post-strikeout-props-to-x:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'schedule' &&
        github.event.workflow_run.head_branch == 'main'
      )
    env:
      X_EXPECTED_USERNAME: _joeknowsball_
      X_DUPLICATE_STATE_DIR: .cache/mlb-strikeout-props-x-posted
      JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
      JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
      JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
      JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - name: Compute ET date for cache key
        id: et_date
        shell: bash
        run: echo "date=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore duplicate-post state
        id: restore_cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/mlb-strikeout-props-x-posted
          key: mlb-strikeout-props-x-posted-${{ steps.et_date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            mlb-strikeout-props-x-posted-${{ steps.et_date.outputs.date }}-

      - name: Already posted today?
        id: already
        shell: bash
        run: |
          KEY="mlb-k-props:${{ steps.et_date.outputs.date }}"
          SLUG="$(echo "$KEY" | sed 's/[^a-zA-Z0-9._-]\+/-/g')"
          if [ -f ".cache/mlb-strikeout-props-x-posted/${SLUG}.json" ] && [ "${{ inputs.force_repost || 'false' }}" != "true" ]; then
            echo "posted=true" >> "$GITHUB_OUTPUT"
            echo "Today's slate already has a post receipt -- skipping (finalStatus=SKIPPED_ALREADY_POSTED_TODAY)."
          else
            echo "posted=false" >> "$GITHUB_OUTPUT"
          fi

      # Lightweight timing gate: NO npm ci / Playwright. Manual workflow_dispatch
      # bypasses it; automated firings must earn a READY (inside the earliest-
      # first-pitch posting window) here.
      - name: Readiness gate
        id: gate
        if: steps.already.outputs.posted != 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Readiness gate bypassed: manual workflow_dispatch (mode=${{ inputs.mode || 'post' }})."
            exit 0
          fi
          set +e
          node scripts/check-mlb-x-posting-readiness.mjs --content=k
          CODE=$?
          set -e
          if [ "$CODE" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Readiness gate: READY -- proceeding to post."
          elif [ "$CODE" -eq 20 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Readiness gate: clean wait/skip -- no post this attempt."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Readiness gate: schedule source failed -- failing closed." >&2
            exit 1
          fi

      - name: Install dependencies
        if: steps.gate.outputs.ready == 'true'
        run: npm ci

      - name: Install Playwright
        if: steps.gate.outputs.ready == 'true'
        run: npx playwright install --with-deps chromium

      # The confirmed-only screenshot renders the immutable selection artifact
      # against the bare /mlb/strikeout-props/x-export route served LOCALLY, so
      # it needs the built SPA in dist/. (The poster still scrapes the live K
      # table for market/projection data, but the SCREENSHOT is the local
      # confirmed-only artifact route, never the live page.)
      - name: Build site for local export render
        if: steps.gate.outputs.ready == 'true'
        run: npm run build

      # No fixed "wait for fresh slate" retry loop: if production K data isn't
      # fresh yet, the poster's own readiness recheck skips cleanly and the next
      # 15-minute poll retries -- no long in-run sleep.
      - name: Post Strikeout Props
        id: post
        if: steps.gate.outputs.ready == 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            MODE="post"
            DATA_SOURCE="production"
          else
            MODE="${{ inputs.mode || 'post' }}"
            DATA_SOURCE="${{ inputs.data_source || 'production' }}"
          fi
          echo "Mode: $MODE"
          echo "Data source: $DATA_SOURCE"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          K_PROPS_DATA_SOURCE="$DATA_SOURCE" node scripts/post-mlb-strikeout-props-to-x.mjs "--${MODE}"
        env:
          X_ALLOW_LIVE_POST: "true"
          K_X_FORCE_REPOST: ${{ inputs.force_repost || 'false' }}
          JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
          JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
          JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
          JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}

      - name: Save duplicate-post state
        if: always() && steps.gate.outputs.ready == 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/mlb-strikeout-props-x-posted
          key: mlb-strikeout-props-x-posted-${{ steps.et_date.outputs.date }}-${{ github.run_id }}

      - name: Upload dry-run selection + screenshot
        if: steps.gate.outputs.ready == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: mlb-strikeout-props-x-dry-run
          path: |
            artifacts/mlb-strikeout-props-x.png
            artifacts/mlb-strikeout-props-x-selection.json
          if-no-files-found: error

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "== Post MLB Strikeout Props to X summary =="
          echo "trigger event: ${{ github.event_name }}"
          echo "already posted today: ${{ steps.already.outputs.posted || 'n/a' }}"
          echo "readiness gate ready: ${{ steps.gate.outputs.ready || 'n/a (skipped: already posted)' }}"
          echo "resolved mode: ${{ steps.post.outputs.mode || 'n/a (gate not ready)' }}"
          echo "force repost override: ${{ inputs.force_repost || 'false' }}"
          echo "See the 'Readiness gate' step for the finalStatus= window decision and the 'Post Strikeout Props' step for the script's own finalStatus=."
