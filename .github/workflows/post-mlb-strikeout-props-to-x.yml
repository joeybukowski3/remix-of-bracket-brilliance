name: Post MLB Strikeout Props to X

# Manual K posting workflow. Automatic earliest-first-pitch polling is owned
# by poll-mlb-x-posts.yml. A tightly marker-gated push recovery path exists so
# an authorized repair commit can recover a missed daily post without making
# normal code pushes post to X.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "post"
        type: choice
        options: [dry-run, post, post-text-only, verify-account]
      data_source:
        description: "Data source"
        required: true
        default: "production"
        type: choice
        options: [production, github, local]
      force_repost:
        description: "Bypass the daily posting lock and post again even if today's slate already has a receipt."
        required: true
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - ".github/workflows/post-mlb-strikeout-props-to-x.yml"

concurrency:
  group: post-mlb-strikeout-props-to-x
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post-strikeout-props-to-x:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[rescue-k-x-post]'))
    env:
      X_EXPECTED_USERNAME: _joeknowsball_
      X_DUPLICATE_STATE_DIR: .cache/mlb-strikeout-props-x-posted
      JKB_X_API_KEY: ${{ secrets.JKB_X_API_KEY }}
      JKB_X_API_SECRET: ${{ secrets.JKB_X_API_SECRET }}
      JKB_X_ACCESS_TOKEN: ${{ secrets.JKB_X_ACCESS_TOKEN }}
      JKB_X_ACCESS_SECRET: ${{ secrets.JKB_X_ACCESS_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - name: Compute ET date for cache key
        id: et_date
        shell: bash
        run: echo "date=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore duplicate-post state
        uses: actions/cache/restore@v4
        with:
          path: .cache/mlb-strikeout-props-x-posted
          key: mlb-strikeout-props-x-posted-${{ steps.et_date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            mlb-strikeout-props-x-posted-${{ steps.et_date.outputs.date }}-

      - name: Already posted today?
        id: already
        shell: bash
        run: |
          KEY="mlb-k-props:${{ steps.et_date.outputs.date }}"
          SLUG="$(echo "$KEY" | sed 's/[^a-zA-Z0-9._-]\+/-/g')"
          FORCE="${{ github.event_name == 'workflow_dispatch' && inputs.force_repost || 'false' }}"
          if [ -f ".cache/mlb-strikeout-props-x-posted/${SLUG}.json" ] && [ "$FORCE" != "true" ]; then
            echo "posted=true" >> "$GITHUB_OUTPUT"
            echo "Today's slate already has a post receipt -- skipping (finalStatus=SKIPPED_ALREADY_POSTED_TODAY)."
          else
            echo "posted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Readiness gate
        id: gate
        if: steps.already.outputs.posted != 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Readiness timing gate bypassed for explicit guarded recovery/manual run; poster still performs live fail-closed validation."
            exit 0
          fi
          set +e
          node scripts/check-mlb-x-posting-readiness.mjs --content=k
          CODE=$?
          set -e
          if [ "$CODE" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          elif [ "$CODE" -eq 20 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Install dependencies
        if: steps.gate.outputs.ready == 'true'
        run: npm ci

      - name: Install Playwright
        if: steps.gate.outputs.ready == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build site for local export render
        if: steps.gate.outputs.ready == 'true'
        run: npm run build

      - name: Post Strikeout Props
        id: post
        if: steps.gate.outputs.ready == 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            MODE="post"
            DATA_SOURCE="production"
          else
            MODE="${{ inputs.mode || 'post' }}"
            DATA_SOURCE="${{ inputs.data_source || 'production' }}"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          K_PROPS_DATA_SOURCE="$DATA_SOURCE" node scripts/post-mlb-strikeout-props-to-x.mjs "--${MODE}"
        env:
          X_ALLOW_LIVE_POST: "true"
          K_X_FORCE_REPOST: ${{ github.event_name == 'workflow_dispatch' && inputs.force_repost || 'false' }}

      - name: Save duplicate-post state
        if: always() && steps.gate.outputs.ready == 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/mlb-strikeout-props-x-posted
          key: mlb-strikeout-props-x-posted-${{ steps.et_date.outputs.date }}-${{ github.run_id }}

      - name: Upload dry-run selection + screenshot
        if: steps.gate.outputs.ready == 'true' && github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: mlb-strikeout-props-x-dry-run
          path: |
            artifacts/mlb-strikeout-props-x.png
            artifacts/mlb-strikeout-props-x-selection.json
          if-no-files-found: error

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "== Post MLB Strikeout Props to X summary =="
          echo "trigger event: ${{ github.event_name }}"
          echo "already posted today: ${{ steps.already.outputs.posted || 'n/a' }}"
          echo "readiness gate ready: ${{ steps.gate.outputs.ready || 'n/a' }}"
          echo "resolved mode: ${{ steps.post.outputs.mode || 'n/a' }}"
          echo "See Post Strikeout Props for finalStatus=."
