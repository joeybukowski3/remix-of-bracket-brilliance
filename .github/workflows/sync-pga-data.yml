name: Sync PGA Data

on:
  workflow_run:
    workflows:
      - Refresh PGA Player History
    types:
      - completed
    branches:
      - main
  schedule:
    # Monday is dependency-triggered only after player history finishes.
    # Tue/Wed 12:00 UTC runs keep the provisional upcoming field current and
    # retry naturally after delayed field or statistics publication.
    #
    # IMPORTANT: no runtime hour gate. The previous design skipped every step
    # unless the run started in the 8 AM ET hour — GitHub regularly delays
    # cron runs by hours, so scheduled runs silently no-opped (all steps
    # skipped, run reported success) and PGA data went stale for weeks.
    - cron: "0 12 * * 2,3"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-pga-data.yml"
      - "scripts/sync-pga-sheet.mjs"
      - "scripts/generate-pga-best-bets.mjs"
      - "scripts/fetch-pga-current-field.mjs"
      - "scripts/lib/pga-field-selection.mjs"
      - "scripts/check-pga-field-sync.mjs"
      - "scripts/generate-pga-detailed-model-data.mjs"
      - "scripts/lib/pga-detailed-model.mjs"
      - "src/data/pga/schedule.json"
      - "public/data/pga/schedule.json"

# Share one lock with the other automated workflows that commit generated data to main.
concurrency:
  group: main-data-writers-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'main' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate JKB Trend round schema from committed history
        run: npm run pga:trend -- --validate-input-only

      - name: Fetch current tournament field
        run: node scripts/fetch-pga-current-field.mjs

      # The Google Sheet is OPTIONAL enrichment (course weights + legacy
      # model sections). A stale or unreachable sheet must never block the
      # weekly field/model refresh — the rankings generator below runs after
      # it and overwrites the model files from online API player stats.
      - name: Sync PGA JSON from Google Sheet (optional enrichment)
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: node scripts/sync-pga-sheet.mjs

      # Stats freshness + fallback MUST run before rankings generation so
      # the model is never built from stale stats when fresh ones exist.
      - name: Check player stats freshness
        id: freshness
        continue-on-error: true
        run: node scripts/check-pga-stats-freshness.mjs

      - name: Fallback - fetch player stats directly from PGA Tour API
        if: steps.freshness.outcome == 'failure'
        continue-on-error: true
        env:
          PGA_API_KEY: ${{ secrets.PGA_API_KEY }}
        run: |
          echo "Sheet data is stale or missing — falling back to direct PGA Tour API pull."
          node scripts/fetch-pga-player-stats.mjs

      - name: Generate and validate JKB Trend in temporary output
        run: npm run pga:trend -- --output-dir "${RUNNER_TEMP}/jkb-trend"

      - name: Publish validated JKB Trend artifacts
        run: |
          cp "${RUNNER_TEMP}/jkb-trend/round-history-pga.json" public/data/pga/round-history-pga.json
          cp "${RUNNER_TEMP}/jkb-trend/jkb-trend-rankings.json" public/data/pga/jkb-trend-rankings.json

      - name: Check whether The Open detailed package is active
        id: open_detailed
        run: node --input-type=module -e "import fs from 'node:fs'; const field = JSON.parse(fs.readFileSync('public/data/pga/current-field.json', 'utf8')); fs.appendFileSync(process.env.GITHUB_OUTPUT, `active=${field.tournamentId === 'R2026100'}\n`);"

      - name: Generate and validate The Open detailed model in temporary output
        if: steps.open_detailed.outputs.active == 'true'
        run: node scripts/generate-pga-detailed-model-data.mjs --slug the-open-2026-picks --output "${RUNNER_TEMP}/the-open-2026.json"

      - name: Publish validated The Open detailed model
        if: steps.open_detailed.outputs.active == 'true'
        run: cp "${RUNNER_TEMP}/the-open-2026.json" public/data/pga/the-open-2026.json

      - name: Generate tournament rankings and model from player stats (primary model source)
        run: node scripts/generate-pga-tournament-rankings.mjs

      - name: Verify field, model and stats match the scheduled current tournament
        run: node scripts/check-pga-field-sync.mjs

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/pga/current-field.json public/data/pga/power-rankings.json public/data/pga/current-tournament.json public/data/pga/next-tournament.json public/data/pga/schedule.json public/data/pga/course-weights.json public/data/pga/player-stats-raw.json public/data/pga/player-stats-meta.json public/data/pga/jkb-trend-rankings.json public/data/pga/round-history-pga.json public/data/pga/the-open-2026.json
          if git diff --cached --quiet; then
            echo "No PGA data changes to commit."
            exit 0
          fi
          git commit -m "chore: sync PGA sheet data"
          git push origin HEAD:${TARGET_BRANCH}

  generate-best-bets:
    needs: sync
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'main' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate PGA best bets
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: npm run pga:best-bets

      - name: Commit and push best bets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/pga/best-bets.json
          if git diff --cached --quiet; then
            echo "No best bets changes to commit."
            exit 0
          fi
          node --input-type=module -e "import fs from 'node:fs'; const field = JSON.parse(fs.readFileSync('public/data/pga/current-field.json', 'utf8')); const bets = JSON.parse(fs.readFileSync('public/data/pga/best-bets.json', 'utf8')); const normalize = (value) => value.normalize('NFKD').replace(/[\\u0300-\\u036f]/g, '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim(); if (normalize(field.tournament) !== normalize(bets.tournament)) throw new Error(\`Refusing to commit best bets for ${bets.tournament}; official field is ${field.tournament}.\`);"
          git commit -m "chore: generate PGA best bets"
          git push origin HEAD:${TARGET_BRANCH}
