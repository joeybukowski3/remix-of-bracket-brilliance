name: Sync PGA Data

on:
  schedule:
    # Monday is the primary weekly PGA model refresh. Tuesday/Wednesday are
    # retained as natural retries when official fields or stats publish late.
    #
    # IMPORTANT: no runtime hour gate. The previous design skipped every step
    # unless the run started in the 8 AM ET hour — GitHub regularly delays
    # cron runs by hours, so scheduled runs silently no-opped (all steps
    # skipped, run reported success) and PGA data went stale for weeks.
    - cron: "0 12 * * 1,2,3"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-pga-data.yml"
      - "scripts/sync-pga-sheet.mjs"
      - "scripts/generate-pga-best-bets.mjs"
      - "scripts/fetch-pga-current-field.mjs"
      - "scripts/fetch-pga-player-stats.mjs"
      - "scripts/generate-pga-tournament-rankings.mjs"
      - "scripts/check-pga-field-sync.mjs"
      - "scripts/check-pga-model-sync.mjs"
      - "scripts/lib/pga-field-selection.mjs"
      - "public/data/pga/schedule.json"

# Share one lock with the other automated workflows that commit generated data to main.
concurrency:
  group: main-data-writers-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'main' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch current tournament field
        run: node scripts/fetch-pga-current-field.mjs

      - name: Sync PGA JSON from Google Sheet optional enrichment
        id: sheet_sync
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: node scripts/sync-pga-sheet.mjs

      - name: Check player stats freshness
        id: freshness
        continue-on-error: true
        run: node scripts/check-pga-stats-freshness.mjs

      - name: Fetch fresh player stats from PGA Tour API when needed
        if: steps.sheet_sync.outcome == 'failure' || steps.freshness.outcome == 'failure'
        env:
          PGA_API_KEY: ${{ secrets.PGA_API_KEY }}
        run: |
          echo "Google Sheet stats are stale, missing, or unavailable — using direct PGA Tour API stats for this run."
          node scripts/fetch-pga-player-stats.mjs

      - name: Generate tournament rankings and model data
        run: node scripts/generate-pga-tournament-rankings.mjs

      - name: Verify field matches the scheduled current tournament
        run: node scripts/check-pga-field-sync.mjs

      - name: Verify model, field, and source freshness
        run: node scripts/check-pga-model-sync.mjs

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/pga
          if git diff --cached --quiet; then
            echo "No PGA data changes to commit."
            exit 0
          fi
          git commit -m "chore: sync PGA Monday model data"
          git push origin HEAD:${TARGET_BRANCH}

  generate-best-bets:
    needs: sync
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || 'main' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate PGA best bets
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: npm run pga:best-bets

      - name: Commit and push best bets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/pga/best-bets.json
          if git diff --cached --quiet; then
            echo "No best bets changes to commit."
            exit 0
          fi
          node --input-type=module -e "import fs from 'node:fs'; const field = JSON.parse(fs.readFileSync('public/data/pga/current-field.json', 'utf8')); const bets = JSON.parse(fs.readFileSync('public/data/pga/best-bets.json', 'utf8')); const normalize = (value) => value.normalize('NFKD').replace(/[\\u0300-\\u036f]/g, '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim(); if (normalize(field.tournament) !== normalize(bets.tournament)) throw new Error(\`Refusing to commit best bets for ${bets.tournament}; official field is ${field.tournament}.\`);"
          git commit -m "chore: generate PGA best bets"
          git push origin HEAD:${TARGET_BRANCH}
