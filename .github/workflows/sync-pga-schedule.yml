name: Sync PGA Tour Schedule

on:
  schedule:
    # Run every Monday at 3 AM ET (7 AM UTC during EDT)
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Update tournament statuses from dates
        run: |
          node << 'SCRIPT'
          const fs = require('fs');

          // SAFE status updater — does NOT fetch any external API and does NOT
          // overwrite the curated schedule. It only recalculates each
          // tournament's `status` field (upcoming / active / complete) based on
          // the startDate/endDate already present in schedule.json.
          //
          // This replaced the old ESPN-fetch version, which (1) failed with
          // HTTP 403 when ESPN blocked the endpoint, and (2) risked wiping the
          // hand-curated schedule (endDate, winner, dataFile, etc.) for any
          // tournament ESPN didn't return.

          const SCHEDULE_PATH = 'public/data/pga/schedule.json';

          try {
            const schedule = JSON.parse(fs.readFileSync(SCHEDULE_PATH, 'utf-8'));
            if (!Array.isArray(schedule)) {
              throw new Error('schedule.json is not an array — aborting to avoid corruption');
            }

            const today = new Date().toISOString().slice(0, 10);
            let changes = 0;

            for (const t of schedule) {
              if (!t.startDate || !t.endDate) continue; // skip malformed rows untouched

              let newStatus;
              if (t.endDate < today) {
                newStatus = 'complete';
              } else if (t.startDate <= today && t.endDate >= today) {
                newStatus = 'active';
              } else {
                newStatus = 'upcoming';
              }

              // Never downgrade a 'complete' tournament that has a recorded winner
              // (protects manually-finalized results from date-math edge cases).
              if (t.status === 'complete' && t.winner && t.winner !== 'TBD') {
                newStatus = 'complete';
              }

              if (t.status !== newStatus) {
                console.log(`  ${t.name}: ${t.status} -> ${newStatus}`);
                t.status = newStatus;
                changes++;
              }
            }

            if (changes === 0) {
              console.log('No status changes needed.');
            } else {
              fs.writeFileSync(SCHEDULE_PATH, JSON.stringify(schedule, null, 2) + '\n');
              console.log(`Updated ${changes} tournament status(es).`);
            }

            const active = schedule.find(t => t.status === 'active');
            console.log(`Active tournament: ${active ? active.name : 'None'}`);
          } catch (err) {
            console.error('Error updating schedule statuses:', err.message);
            process.exit(1);
          }
          SCRIPT

      - name: Commit schedule update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet public/data/pga/schedule.json; then
            echo "No changes to schedule"
          else
            git add public/data/pga/schedule.json
            git commit -m "chore: auto-update PGA tournament statuses - $(TZ=America/New_York date '+%Y-%m-%d')"

            PUSHED=false
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then PUSHED=true; break; fi
              echo "Push attempt $attempt failed — pulling and rebasing..."
              git pull --rebase origin main || true
              sleep 5
            done
            if [ "$PUSHED" = "true" ]; then
              echo "Schedule synced"
            else
              echo "All push attempts failed — status update not saved this run (will retry next week)."
            fi
          fi
