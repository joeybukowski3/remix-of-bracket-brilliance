name: Test Numerology Refresh

on:
  push:
    branches:
      - test/numerology-stitch-v2
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: test-numerology-stitch-v2-refresh
  cancel-in-progress: true

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: test/numerology-stitch-v2
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate fresh numerology data
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: node scripts/generate-mlb-numerology.mjs

      - name: Validate generated data and page
        run: |
          node -e "const fs=require('fs');const p='public/data/mlb/numerology-daily.json';const d=JSON.parse(fs.readFileSync(p,'utf8'));if(!d.date||!d.dailyProfile||!Array.isArray(d.exactNumberMatches)||!Array.isArray(d.rootNumberMatches))throw new Error('Invalid numerology data');console.log('Validated',d.date,d.exactNumberMatches.length,d.rootNumberMatches.length)"
          npx vitest run src/pages/MlbNumerologyPage.render.test.tsx
          npm run build

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- public/data/mlb/numerology-daily.json public/data/mlb/numerology/history; then
            echo "No numerology data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/mlb/numerology-daily.json public/data/mlb/numerology/history
          git commit -m "chore: refresh test numerology data"
          git push origin HEAD:test/numerology-stitch-v2
