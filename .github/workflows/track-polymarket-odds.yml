name: Track Polymarket Odds

on:
  workflow_dispatch:
  schedule:
    # Hourly snapshots 11am–11pm UTC (7am–7pm ET) — covers full MLB day
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
    - cron: "0 18 * * *"
    - cron: "0 19 * * *"
    - cron: "0 20 * * *"
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"
    # Late coverage for West Coast games (through midnight ET)
    - cron: "0 0 * * *"
    - cron: "0 1 * * *"
    - cron: "0 2 * * *"
    # 3am ET grader (7am UTC)
    - cron: "0 7 * * *"

jobs:
  snapshot:
    name: Snapshot Polymarket prices
    runs-on: ubuntu-latest
    # Skip the 3am grader run (7 UTC) from this job
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && (github.event.schedule != '0 7 * * *'))
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch and append Polymarket snapshot
        run: node scripts/fetch-polymarket-snapshots.mjs

      - name: Commit snapshot
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/polymarket/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: polymarket snapshot $(TZ=America/New_York date '+%Y-%m-%d %H:%M ET')"
            PUSHED=false
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && PUSHED=true && break
              echo "Push attempt $attempt failed, retrying..."
              sleep $((attempt * 5))
            done
            if [ "$PUSHED" = "true" ]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  grade:
    name: Grade yesterday's results
    runs-on: ubuntu-latest
    # Only run at 3am ET (7am UTC)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Grade Polymarket results
        run: node scripts/grade-polymarket-results.mjs

      - name: Commit graded results
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/polymarket/

          if git diff --cached --quiet; then
            echo "No new grades to commit"
          else
            git commit -m "chore: grade polymarket results $(TZ=America/New_York date '+%Y-%m-%d')"
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && break
              sleep $((attempt * 5))
            done
          fi
